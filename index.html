<style>
  :root{
    /* لوحة الألوان — مستوحاة من الطين العماني وأخضر الواحة */
    --sand-50:#faf7f1;
    --sand-100:#f3ede1;
    --sand-200:#e7dcc6;
    --clay:#b07d4f;
    --clay-dark:#8a5e36;
    --oasis:#1f5d4c;      /* أخضر الواحة الداكن — اللون الأساسي */
    --oasis-700:#184a3c;
    --oasis-600:#256a55;
    --oasis-50:#e8f1ee;
    --ink:#2a2620;
    --muted:#7a7264;
    --line:#e4dccd;
    --ok:#1f7a4d;
    --ok-bg:#e3f3ea;
    --work:#1d6fa5;
    --work-bg:#e4f0f8;
    --wait:#9a8f7c;
    --wait-bg:#f0ebe1;
    --stop:#b8860b;
    --stop-bg:#fbf2dc;
    --cancel:#b3402f;
    --cancel-bg:#f9e6e2;
    --danger:#b3402f;
    --shadow:0 1px 2px rgba(42,38,32,.05), 0 8px 24px -12px rgba(42,38,32,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Tajawal',system-ui,sans-serif;
    background:var(--sand-50);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  h1,h2,h3,h4{font-family:'Cairo','Tajawal',sans-serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--oasis-600);box-shadow:0 0 0 3px rgba(37,106,85,.15)}
  .hidden{display:none !important}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}

  /* ====== شاشة الدخول ====== */
  .auth-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:20px;position:relative;overflow:hidden;
    background:var(--oasis-700);
    background-size:cover;background-position:center;
  }
  /* طبقة خضراء فوق صورة المبنى لإبقاء البطاقة والنصوص واضحة */
  .auth-overlay{
    position:absolute;inset:0;z-index:1;
    background:linear-gradient(135deg,rgba(31,93,76,.80) 0%,rgba(24,74,60,.86) 100%);
  }
  .auth-pattern{
    position:absolute;inset:0;opacity:.07;
    background-image:radial-gradient(circle at 20% 30%, #fff 0 2px, transparent 2px),
                     radial-gradient(circle at 70% 60%, #fff 0 2px, transparent 2px);
    background-size:48px 48px;
  }
  .auth-card{
    position:relative;z-index:2;width:100%;max-width:420px;
    background:#fff;border-radius:20px;padding:34px 30px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.4);
    border-top:5px solid var(--clay);
  }
  .auth-logo{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:26px}
  .auth-crest{
    width:auto;height:78px;display:flex;align-items:center;justify-content:center;
    margin-bottom:16px;
  }
  .auth-crest img{height:100%;width:auto;object-fit:contain}
  .auth-card h1{font-size:21px;color:var(--ink)}
  .auth-card .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:#4a443a}
  .field input,.field select{
    width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;
    background:var(--sand-50);transition:.15s;
  }
  .ltr{direction:ltr;text-align:left}
  .btn-primary{
    width:100%;background:var(--oasis);color:#fff;font-weight:700;font-size:15px;
    padding:13px;border-radius:11px;transition:.15s;display:flex;justify-content:center;align-items:center;gap:8px;
  }
  .btn-primary:hover{background:var(--oasis-700)}
  .btn-primary:disabled{opacity:.6;cursor:default}
  .switch-link{display:block;width:100%;text-align:center;margin-top:18px;color:var(--oasis-600);font-size:13px;font-weight:600}
  .err{background:var(--cancel-bg);color:var(--cancel);padding:11px 13px;border-radius:10px;font-size:13px;margin-bottom:14px;border:1px solid #f0cfc8}
  .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ====== شريط علوي ====== */
  header.topbar{
    background:var(--oasis);color:#fff;position:sticky;top:0;z-index:30;
    box-shadow:0 2px 12px rgba(24,74,60,.25);
  }
  .topbar-inner{max-width:1200px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  @media(max-width:640px){ .eom-badge{order:5;width:100%;justify-content:center} }
  .brand{display:flex;align-items:center;gap:11px}
  .brand-crest{height:40px;width:auto;display:flex;align-items:center;justify-content:center}
  .brand-crest img{height:100%;width:auto;object-fit:contain}
  .brand h1{font-size:17px;line-height:1.2}
  .brand .crumb{font-size:11px;color:rgba(255,255,255,.7)}
  .search{flex:1;min-width:180px;position:relative}
  .search input{width:100%;padding:9px 38px 9px 14px;border-radius:30px;border:none;background:rgba(255,255,255,.92);color:var(--ink)}
  .search svg{position:absolute;right:12px;top:9px;color:var(--oasis-600)}
  .user-box{display:flex;align-items:center;gap:9px}
  .user-meta{text-align:left;line-height:1.25}
  .user-meta .nm{font-size:13px;font-weight:700}
  .user-meta .rl{font-size:11px;color:rgba(255,255,255,.72)}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--oasis-600);border:2px solid rgba(255,255,255,.4);overflow:hidden;display:flex;align-items:center;justify-content:center}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .icon-btn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;transition:.15s}
  .icon-btn:hover{background:rgba(255,255,255,.16)}

  /* ====== المحتوى ====== */
  main{max-width:1200px;margin:0 auto;padding:26px 18px 60px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .toolbar h2{font-size:20px;color:var(--ink)}
  .toolbar h2 span{color:var(--clay);font-weight:700}
  .tb-actions{display:flex;gap:9px;flex-wrap:wrap}
  .btn{padding:9px 15px;border-radius:10px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;transition:.15s;color:#fff}
  .btn-add{background:var(--oasis)}.btn-add:hover{background:var(--oasis-700)}
  form[data-opinion="1"] .rate-quality{display:none!important}
  /* أعمالي — التنسيق والمتابعة */
  .mw-tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:2px solid var(--line);flex-wrap:wrap}
  .mw-tab{background:none;border:none;padding:9px 16px;font-family:inherit;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
  .mw-tab.active{color:var(--oasis-700);border-bottom-color:var(--oasis)}
  .mw-daybar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .mw-daybar label{font-size:13px;font-weight:700;color:var(--ink)}
  .mw-daybar input{padding:7px 10px;border:1px solid var(--line);border-radius:9px;font-family:inherit}
  .mw-daycount{margin-inline-start:auto;background:var(--oasis-50);color:var(--oasis-700);font-weight:700;font-size:12.5px;padding:5px 12px;border-radius:20px}
  .mw-tasklist{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .mw-taskrow{display:flex;align-items:center;gap:11px;background:var(--sand-50);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
  .mw-taskrow.done{background:var(--oasis-50);border-color:#bfe0d5}
  .mw-check{width:26px;height:26px;min-width:26px;border-radius:7px;border:2px solid var(--oasis);background:#fff;color:#fff;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
  .mw-check.on{background:var(--oasis);border-color:var(--oasis)}
  .mw-taskname{flex:1;font-weight:600;color:var(--ink)}
  .mw-taskrow.done .mw-taskname{text-decoration:line-through;color:var(--muted)}
  .mw-del{background:none;border:none;color:#c0392b;cursor:pointer;padding:4px;opacity:.7}.mw-del:hover{opacity:1}
  .mw-addbox{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
  .mw-addbox input{flex:1;min-width:200px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit}
  .mw-form{display:flex;flex-direction:column;gap:4px}
  .mw-form input,.mw-form select,.mw-form textarea{padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;margin-bottom:8px}
  .mw-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .mw-filters select,.mw-filters input{padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13px}
  .mw-filters label{font-size:12.5px;font-weight:700;color:var(--muted)}
  .mw-archsum{font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .mw-loglist{display:flex;flex-direction:column;gap:10px}
  .mw-logcard{background:var(--sand-50);border:1px solid var(--line);border-radius:12px;padding:13px;position:relative}
  .mw-logtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
  .mw-cat{font-size:12px;font-weight:700;color:var(--oasis-700);background:var(--oasis-50);padding:3px 10px;border-radius:14px}
  .mw-date{font-size:12px;color:var(--muted);font-weight:600;direction:ltr}
  .mw-logtitle{font-weight:700;color:var(--ink);margin-bottom:4px}
  .mw-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:12px;margin-inline-start:6px}
  .mw-badge.done{background:#e3f3ec;color:#1f7a54}.mw-badge.wip{background:#fdf1dc;color:#a9761b}
  .mw-logdesc{font-size:13px;color:var(--ink);line-height:1.7}
  .mw-lognotes{font-size:12px;color:var(--muted);margin-top:4px}
  .mw-logacts{position:absolute;top:10px;inset-inline-start:10px}
  .mw-empty{text-align:center;color:var(--muted);font-size:13px;padding:26px 10px}
  .act-card:hover{border-color:var(--oasis)!important}
  .act-month{margin-bottom:10px}
  .act-month-head{width:100%;display:flex;align-items:center;gap:10px;background:var(--oasis-50);border:1px solid var(--line);border-radius:11px;padding:11px 14px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:800;color:var(--oasis-700);transition:background .12s}
  .act-month-head:hover{background:#dcebe5}
  .act-month-head.open{border-bottom-left-radius:0;border-bottom-right-radius:0}
  .act-month-head .amh-title{flex:1;text-align:right}
  .act-month-head .amh-count{background:var(--oasis);color:#fff;font-size:12px;font-weight:700;min-width:24px;height:22px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;padding:0 7px}
  .act-month-head .amh-chev{font-size:15px;color:var(--oasis)}
  .act-month-body{border:1px solid var(--line);border-top:none;border-radius:0 0 11px 11px;padding:12px 12px 4px;background:#fff}
  .btn-xl{background:var(--clay)}.btn-xl:hover{background:var(--clay-dark)}
  .btn-del{background:var(--danger)}.btn-del:hover{filter:brightness(.92)}
  .btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  @media(max-width:560px){.btn span.lbl{display:none}}

  /* ====== بطاقات المشاريع ====== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px}
  .done-section{margin-top:26px}
  .done-section.done-top{margin-top:0;margin-bottom:24px}
  .done-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 18px;font-family:'Cairo';font-weight:700;font-size:15px;color:var(--oasis-700);transition:.15s;box-shadow:var(--shadow)}
  .done-toggle:hover{background:var(--sand-50)}
  .done-count{background:var(--ok-bg);color:var(--ok);font-size:12px;font-weight:700;padding:2px 11px;border-radius:20px;font-family:'Tajawal'}
  .done-arrow{display:flex;transition:transform .2s;color:var(--muted)}
  .done-arrow.open{transform:rotate(180deg)}
  .done-body{display:none;margin-top:16px}
  .done-body.open{display:block}
  .done-body .card{border:2px solid var(--oasis);box-shadow:0 4px 14px -6px rgba(31,93,76,.35)}
  .done-entry{margin-bottom:22px;cursor:pointer}
  .done-screen-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .grid.done-body.open{display:grid}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
  .card:hover{transform:translateY(-2px);box-shadow:0 12px 30px -14px rgba(42,38,32,.3)}
  .card-head{padding:15px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--sand-50),#fff)}
  .card-head .row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .tag{font-size:11px;font-weight:700;color:var(--clay-dark);background:var(--sand-100);padding:3px 10px;border-radius:20px}
  .pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid}
  .card-head h3{font-size:16px;line-height:1.3;margin-bottom:5px}
  .entity{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .card-body{padding:15px 16px;flex:1}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;font-size:12px;padding-bottom:13px;margin-bottom:13px;border-bottom:1px dashed var(--line)}
  .meta-grid .k{color:var(--muted)}
  .meta-grid .v{font-weight:700}
  .sec{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:9px;background:var(--sand-50);border:1px solid var(--line);margin-bottom:7px}
  .sec-col{flex-direction:column;align-items:stretch}
  .sec-row{display:flex;justify-content:space-between;align-items:center}
  .sec-dates{font-size:10.5px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}
  .sec-rate{font-size:11px;color:var(--clay-dark);margin-top:5px;font-weight:700}
  .sec-l{display:flex;align-items:center;gap:8px}
  .sec-l .ttl{font-size:12px;font-weight:700}
  .sec-l .eng{font-size:10px;color:var(--muted)}
  .sec-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:14px}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .card-foot{background:var(--sand-50);padding:9px 14px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .card-foot .upd{font-size:10px;color:var(--muted);line-height:1.35}
  .card-foot .acts{display:flex;gap:6px}
  .act{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s}
  .act-edit{color:var(--oasis-600)}.act-edit:hover{background:var(--oasis-50)}
  .act-del{color:var(--danger)}.act-del:hover{background:var(--cancel-bg)}

  .empty,.loading{text-align:center;padding:70px 20px;background:#fff;border:1px solid var(--line);border-radius:16px;color:var(--muted)}
  .loading .spinner{border-color:var(--line);border-top-color:var(--oasis);width:38px;height:38px;border-width:3px;margin:0 auto}

  /* ====== النوافذ المنبثقة ====== */
  .overlay{position:fixed;inset:0;background:rgba(42,38,32,.55);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;overflow-y:auto}
  .modal{background:#fff;border-radius:18px;width:100%;max-width:860px;max-height:92vh;overflow-y:auto;box-shadow:0 30px 70px -20px rgba(0,0,0,.5)}
  .modal-sm{max-width:380px}
  .modal-head{position:sticky;top:0;background:var(--oasis);color:#fff;padding:15px 22px;display:flex;justify-content:space-between;align-items:center;z-index:5}
  .modal-head h2{font-size:17px}
  .modal-body{padding:22px}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .lbl-sm{display:block;font-size:12px;font-weight:700;margin-bottom:5px;color:#4a443a}
  .inp{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:var(--sand-50)}
  .divider{height:1px;background:var(--line);margin:20px 0}
  .dept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:13px}
  .dept{background:var(--sand-50);border:1px solid var(--line);border-radius:11px;padding:13px}
  .eng-multi{background:#fff;border:1px solid var(--line);border-radius:9px;padding:6px;max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
  .eng-opt{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;font-size:13.5px;cursor:pointer;transition:background .12s}
  .eng-opt:hover{background:var(--sand-50)}
  .eng-opt input{width:17px;height:17px;accent-color:var(--oasis)}
  .dept h4{font-size:13px;color:var(--oasis-700);border-bottom:1px solid var(--line);padding-bottom:7px;margin-bottom:10px}
  .dept .inp{margin-bottom:8px;font-size:12px}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding-top:18px;margin-top:18px;border-top:1px solid var(--line)}
  .confirm-pop{position:absolute;bottom:38px;left:0;background:#fff;border:1px solid #f0cfc8;border-radius:10px;padding:10px;width:140px;box-shadow:var(--shadow);z-index:10}
  .confirm-pop p{font-size:12px;text-align:center;font-weight:700;color:var(--danger);margin-bottom:8px}
  .confirm-pop .cp-btns{display:flex;gap:6px}
  .confirm-pop button{flex:1;font-size:12px;padding:5px;border-radius:7px;font-weight:700}

  /* لافتة إعداد Firebase */
  .setup-banner{background:var(--stop-bg);border:1px solid #ecd9a8;color:#7a5d12;border-radius:14px;padding:16px 18px;margin-bottom:22px;font-size:13.5px;line-height:1.7}
  .setup-banner b{color:#5e4709}
  .setup-banner code{background:#fff;padding:1px 6px;border-radius:5px;font-size:12px;border:1px solid #e8d6a4}
</style>

let FB={};
async function loadFirebase(){
  const [appMod,authMod,fsMod]=await Promise.all([
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"),
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
  ]);
  FB={...authMod,...fsMod};
  const app=appMod.initializeApp(firebaseConfig);
  auth=authMod.getAuth(app);
  db=fsMod.getFirestore(app);
}

/* ---- تتبّع نشاط المستخدمين (لقياس تبنّي النظام) ---- */
function statsDoc(username){
  return FB.doc(db,'artifacts',APP_ID,'public','data','stats', username);
}
/* يسجّل حدثاً: دخول، إنشاء مشروع، أو تحديث مشروع */
async function logActivity(kind){
  if(!CONFIGURED || !state.appUser || !state.appUser.username) return;
  const u=state.appUser;
  const now=new Date().toISOString();
  try{
    const ref=statsDoc(u.username);
    let cur={};
    try{ const snap=await FB.getDoc(ref); if(snap.exists()) cur=snap.data(); }catch(e){}
    const data={
      username:u.username,
      name:u.name||u.username,
      role:u.role||'engineer',
      dept:u.dept||'',
      jobTitle:u.jobTitle||'',
      logins:(cur.logins||0)+(kind==='login'?1:0),
      creates:(cur.creates||0)+(kind==='create'?1:0),
      updates:(cur.updates||0)+(kind==='update'?1:0),
      lastLogin:(kind==='login')?now:(cur.lastLogin||null),
      lastActivity:now,
      firstSeen:cur.firstSeen||now
    };
    await FB.setDoc(ref,data);
  }catch(e){console.error("تسجيل النشاط:",e);}
}

async function initFirebase(){
  if(!CONFIGURED){state.fbReady=true;state.loading=false;render();return;}
  state.loading=false; render();            // ارسمي شاشة الدخول فوراً
  try{
    await loadFirebase();
    FB.signInAnonymously(auth).catch(e=>console.error("مصادقة:",e));
    FB.onAuthStateChanged(auth,(u)=>{ if(u){state.fbReady=true; subscribeProjects(); subscribeOptions(); subscribeStats(); subscribeUsers(); subscribeNotifs(); subscribeTrash(); subscribeVisits(); subscribeMeetings(); subscribeMyWorks();} });
  }catch(e){
    console.error("تحميل Firebase:",e);
    state.authError='تعذّر الاتصال بقاعدة البيانات. تحقّق من الإنترنت ومن صحة مفاتيح Firebase.';
    render();
  }
}
function subscribeProjects(){
  FB.onSnapshot(colRef(),(snap)=>{
    const data = snap.docs.map(d=>({id:d.id,...d.data()}));
    data.sort((a,b)=> new Date(b.updatedAtTS||b.createdAt||0) - new Date(a.updatedAtTS||a.createdAt||0));
    state.projects=data; applyFilter(); state.loading=false;
    // لا تُعِد رسم الصفحة إذا كان المستخدم يعبّئ نموذجاً مفتوحاً (نموذج مشروع/زيارة/اجتماع/أعمالي)

let notifsPanelOpen=false;
function toggleNotifPanel(){
  if(document.getElementById('notifPanel')){ closeNotifPanel(); return; }
  notifsPanelOpen=true;
  const panel=$(`<div class="overlay" id="notifPanel" style="align-items:flex-start;justify-content:flex-start"></div>`);
  const card=document.createElement('div');
  card.style.cssText='margin:64px 14px 0 auto;background:#fff;border-radius:14px;max-width:360px;width:100%;max-height:75vh;overflow-y:auto;box-shadow:0 20px 50px -15px rgba(0,0,0,.4)';
  panel.appendChild(card);
  panel._render=()=>{
    const list=myNotifs();
    const hasUnread=list.some(n=>!n.read);
    const hasRead=list.some(n=>n.read);
    card.innerHTML=`<div style="position:sticky;top:0;background:var(--oasis);color:#fff;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px">
        <span style="font-family:'Cairo';font-weight:700">الإشعارات</span>
        <span style="display:flex;gap:12px">
          ${hasUnread?`<button id="markAll" style="color:#fff;font-size:12px;text-decoration:underline">تعليم الكل مقروء</button>`:''}
          ${hasRead?`<button id="clearRead" style="color:#ffd9d2;font-size:12px;text-decoration:underline">مسح المقروء</button>`:''}
        </span>
      </div>
      <div style="padding:8px">
      ${list.length? list.map(n=>`
        <div style="display:flex;align-items:stretch;gap:6px;margin-bottom:6px">
          <div data-nid="${n.id}" style="flex:1;padding:11px;border-radius:10px;background:${n.read?'#fff':'var(--oasis-50)'};border:1px solid var(--line);cursor:pointer">
            <div style="font-size:13px;line-height:1.7;color:var(--ink)">${n.text||''}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:5px">${fmtDate(n.at)}${n.read?'':' · جديد'}</div>
          </div>
          <button data-del="${n.id}" title="حذف الإشعار" style="border:1px solid var(--line);background:#fff;border-radius:10px;width:38px;display:flex;align-items:center;justify-content:center;color:var(--danger);cursor:pointer">${I.close}</button>
        </div>`).join('')
       : `<div style="padding:40px 16px;text-align:center;color:var(--muted);font-size:13px">لا توجد إشعارات.</div>`}
      </div>`;
    const ma=card.querySelector('#markAll');
    if(ma) ma.onclick=async()=>{ for(const n of list.filter(x=>!x.read)) await markNotifRead(n.id); };
    const cr=card.querySelector('#clearRead');
    if(cr) cr.onclick=async()=>{ if(confirm('مسح كل الإشعارات المقروءة؟')) await clearReadNotifs(); };
    card.querySelectorAll('[data-nid]').forEach(el=>{
      el.onclick=async()=>{ await markNotifRead(el.getAttribute('data-nid')); };
    });
    card.querySelectorAll('[data-del]').forEach(el=>{
      el.onclick=async(e)=>{ e.stopPropagation(); await deleteNotif(el.getAttribute('data-del')); };
    });
  };
  panel._render();
  panel.onclick=(e)=>{ if(e.target===panel) closeNotifPanel(); };
  root.appendChild(panel);
}

async function createUser(u){
  const username=(u.username||'').trim().toLowerCase();
  const password=(u.password||'').trim();
  const name=(u.name||'').trim();
  const email=(u.email||'').trim();
  if(!username||!password||!name){ alert('يرجى تعبئة الاسم واسم المستخدم والرقم السري.'); return false; }
  if(!email){ alert('البريد الإلكتروني إلزامي للحسابات الجديدة.'); return false; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ alert('صيغة البريد الإلكتروني غير صحيحة.'); return false; }
  if(username===ADMIN.user){ alert('اسم المستخدم محجوز.'); return false; }
  try{
    const dup=await FB.getDocs(FB.query(usersRef(),FB.where("username","==",username)));
    if(!dup.empty){ alert('اسم المستخدم محجوز مسبقاً، اختر اسماً آخر.'); return false; }
    await FB.addDoc(usersRef(),{username,password,name,email,role:'engineer',dept:u.dept||'architectural',jobTitle:u.jobTitle||'',profilePic:''});
    return true;
  }catch(e){ console.error(e); alert('تعذّر إنشاء الحساب.'); return false; }
}

/* يولّد البريد من الرقم الوظيفي (اسم المستخدم) لكل من لا بريد له */
async function generateMissingEmails(){
  const targets=state.users.filter(u=>u.role!=='admin' && u.username && !u.email);
  if(!targets.length){ alert('كل المستخدمين لديهم بريد بالفعل.'); return; }

  let done=0;
  for(const u of targets){

    if(ok) done++;
  }

}

async function handleAuth(form){
  state.authError='';state.loading=true;render();
  const fd=new FormData(form);
  const username=(fd.get('username')||'').trim().toLowerCase();
  const password=(fd.get('password')||'').trim();

  if(username===ADMIN.user && password.toLowerCase()===ADMIN.pass){
    state.appUser={role:'admin',name:'تركي (المشرف العام)',username,profilePic:''};
    saveSession(state.appUser);
    state.loading=false;render();return;
  }
  if(!CONFIGURED){
    state.authError='قاعدة البيانات غير مُعدّة بعد — لا يمكن تسجيل دخول المهندسين حتى تُضاف مفاتيح Firebase.';
    state.loading=false;render();return;
  }
  try{
    const qs=await FB.getDocs(FB.query(usersRef(),FB.where("username","==",username),FB.where("password","==",password)));
    if(qs.empty){state.authError='اسم المستخدم أو الرقم السري غير صحيح.';}
    else{state.appUser=qs.docs[0].data();saveSession(state.appUser);logActivity('login');}
  }catch(e){console.error(e);state.authError='تعذّر الاتصال، حاول مرة أخرى.';}
  state.loading=false;render();
}

/* ════════════ استيراد Excel ════════════ */
function handleExcelImport(file){
  if(!file||!CONFIGURED) return;
  state.loading=true;render();
  const reader=new FileReader();
  reader.onload=async(evt)=>{
    try{
      const wb=window.XLSX.read(evt.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=window.XLSX.utils.sheet_to_json(ws,{header:1});
      let cur=null; const out=[]; const now=new Date().toLocaleString('ar-OM');
      for(const row of rows){
        if(!row||!row.length) continue;
        const c1=String(row[0]||'').trim(), c2=String(row[1]||'').trim(), c3=String(row[2]||'').trim();
        const t=c2||c1; if(!t) continue;
        if(t.includes('دائرة')||t.includes('تتبع المشاريع')||t.includes('اسم المشروع')||t.includes('تاريخ تحديث')) continue;
        if(t.includes('المعماري -')){ if(cur){cur.architectural.engineer=t.replace('المعماري -','').trim(); if(c3&&c3!=='-')cur.requestingEntity=c3;} }
        else if(t.includes('الانشائي -')){ if(cur)cur.structural.engineer=t.replace('الانشائي -','').trim(); }
        else if(t.includes('الخدمات -')){ if(cur)cur.services.engineer=t.replace('الخدمات -','').trim(); }
        else if(t.length>3 && !/^[0-9]+$/.test(t)){
          if(cur&&cur.name) out.push(cur);
          cur={name:t,type:'أخرى',customType:'استيراد من الإكسل',
            requestingEntity:(c3&&c3!=='-')?c3:'غير محدد',overallStatus:'قيد التصميم',
            area:'',cost:'',startDate:'',endDate:'',
            architectural:{engineer:'',status:'قيد الانتظار',notes:''},
            structural:{engineer:'',status:'قيد الانتظار',notes:''},
            services:{engineer:'',status:'قيد الانتظار',notes:''},
            lastUpdatedBy:state.appUser.name,lastUpdatedAt:now,createdAt:new Date().toISOString()};
        }
      }
      if(cur&&cur.name) out.push(cur);
      for(const p of out) await FB.addDoc(colRef(),p);
      state.loading=false;render();
      alert(`تم استيراد ${out.length} مشروع بنجاح.`);
    }catch(e){console.error(e);state.loading=false;render();alert('تعذّرت قراءة ملف الإكسل.');}
  };
  reader.readAsBinaryString(file);
}

/* أعمدة النمطين */
const IMPORT_FULL_COLS=['اسم المشروع','رقم المشروع','النوع','الجهة الطالبة','المساحة','التكلفة','تاريخ الاستلام','تاريخ التسليم المتوقع','المهندس المعماري (رقم وظيفي أو اسم)','المهندس الإنشائي (رقم وظيفي أو اسم)','مهندس الخدمات (رقم وظيفي أو اسم)'];
const IMPORT_SIMPLE_COLS=['اسم المشروع','رقم المشروع','الجهة الطالبة','تاريخ الاستلام','تاريخ التسليم المتوقع'];
/* يبني كائن مهندس من قيمة (رقم وظيفي أو اسم) ضمن قسم محدّد */
function resolveEngineer(val, deptKey){
  const v=String(val||'').trim(); if(!v) return {engineers:[],engineer:'',engineerUsername:''};
  // مطابقة بالرقم الوظيفي أولاً، ثم بالاسم ضمن نفس القسم
  let u=state.users.find(x=>x.username===v && x.dept===deptKey)
      || state.users.find(x=>x.username===v)
      || state.users.find(x=>(x.name||'')===v && x.dept===deptKey)
      || state.users.find(x=>(x.name||'')===v);
  if(u) return {engineers:[{username:u.username,name:u.name}], engineer:u.name, engineerUsername:u.username};
  // لم يُربط ⇒ نص حر
  return {engineers:[], engineer:v, engineerUsername:''};
}
function downloadImportTemplate(mode){
  if(!window.XLSX){ alert('تعذّر تحميل أداة Excel.'); return; }
  const cols = mode==='full'?IMPORT_FULL_COLS:IMPORT_SIMPLE_COLS;
  const sample = mode==='full'
    ? ['مثال: تطوير حديقة','2026-101','حديقة','بلدية مسقط','1200','—','2026-06-01','2026-08-01','1001','1015','1032']
    : ['مثال: تطوير حديقة','2026-101','بلدية مسقط','2026-06-01','2026-08-01'];
  const ws=window.XLSX.utils.aoa_to_sheet([cols, sample]);
  ws['!cols']=cols.map(()=>({wch:22})); ws['!views']=[{RTL:true}];
  const wb=window.XLSX.utils.book_new();
  window.XLSX.utils.book_append_sheet(wb,ws,'المشاريع');
  window.XLSX.writeFile(wb,`نموذج_استيراد_${mode==='full'?'كامل':'مبسط'}.xlsx`);
}
function importProjectsFromFile(file, mode){
  if(!file||!CONFIGURED) return;
  state.loading=true;render();
  const reader=new FileReader();
  reader.onload=async(evt)=>{
    try{
      const wb=window.XLSX.read(evt.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=window.XLSX.utils.sheet_to_json(ws,{header:1,raw:false});
      const now=new Date().toLocaleString('ar-OM'); const nowISO=new Date().toISOString();
      const out=[];
      const fmtDateCell=(v)=>{ const s=String(v||'').trim(); if(!s||s==='—') return '';
        // يقبل YYYY-MM-DD مباشرة
        if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
        const d=new Date(s); return isNaN(d)?'':d.toISOString().slice(0,10); };
      for(let i=1;i<rows.length;i++){   // تخطّي صف العناوين
        const r=rows[i]; if(!r||!r.length) continue;
        const name=String(r[0]||'').trim();
        if(!name || name.startsWith('مثال:')) continue;
        let p;
        if(mode==='full'){
          p={ name, projectNo:String(r[1]||'').trim(), type:String(r[2]||'').trim()||'أخرى', customType:'',
            requestingEntity:String(r[3]||'').trim()||'غير محدد', area:String(r[4]||'').trim(), cost:String(r[5]||'').trim(),
            startDate:fmtDateCell(r[6]), endDate:fmtDateCell(r[7]), overallStatus:'قيد التصميم',
            architectural:{...resolveEngineer(r[8],'architectural'),status:'قيد الانتظار',notes:'',startDate:fmtDateCell(r[6]),endDate:fmtDateCell(r[7]),actualDate:''},
            structural:{...resolveEngineer(r[9],'structural'),status:'قيد الانتظار',notes:'',startDate:fmtDateCell(r[6]),endDate:fmtDateCell(r[7]),actualDate:''},
            services:{...resolveEngineer(r[10],'services'),status:'قيد الانتظار',notes:'',startDate:fmtDateCell(r[6]),endDate:fmtDateCell(r[7]),actualDate:''} };
        }else{
          const sd=fmtDateCell(r[3]), ed=fmtDateCell(r[4]);
          p={ name, projectNo:String(r[1]||'').trim(), type:'أخرى', customType:'',
            requestingEntity:String(r[2]||'').trim()||'غير محدد', area:'', cost:'',
            startDate:sd, endDate:ed, overallStatus:'قيد التصميم',
            architectural:{engineers:[],engineer:'',engineerUsername:'',status:'قيد الانتظار',notes:'',startDate:sd,endDate:ed,actualDate:''},
            structural:{engineers:[],engineer:'',engineerUsername:'',status:'قيد الانتظار',notes:'',startDate:sd,endDate:ed,actualDate:''},
            services:{engineers:[],engineer:'',engineerUsername:'',status:'قيد الانتظار',notes:'',startDate:sd,endDate:ed,actualDate:''} };
        }
        p.lastUpdatedBy=state.appUser.name; p.lastUpdatedAt=now; p.createdAt=nowISO; p.updatedAtTS=nowISO;
        out.push(p);
      }
      if(!out.length){ state.loading=false;render(); alert('لم يُعثر على مشاريع صالحة في الملف.'); return; }
      for(const p of out) await FB.addDoc(colRef(),p);
      state.loading=false;render();
      alert(`تم استيراد ${out.length} مشروع بنجاح.`);
    }catch(e){ console.error(e); state.loading=false;render(); alert('تعذّرت قراءة الملف. تأكد من مطابقته للنموذج.'); }
  };
  reader.readAsBinaryString(file);
}

async function saveProject(data,editingId,prev){
  const nowISO=new Date().toISOString();
  const todayStr=new Date().toISOString().slice(0,10);   // YYYY-MM-DD
  // سجّل تاريخ التسليم الفعلي لكل قسم: يُثبَّت عند أول اكتمال ولا يتغيّر بتعديل الاسم أو الملاحظات
  for(const key of ['architectural','structural','services']){
    if(!data[key]) continue;
    const nowSt=data[key].status;
    const prevActual = prev && prev[key] ? (prev[key].actualDate||'') : '';
    const prevSt = prev && prev[key] ? (prev[key].status||'') : '';
    const incoming = data[key].actualDate || '';   // قيمة الحقل القادمة (للمخوّل بتعديل التواريخ فقط)
    if(nowSt==='مكتمل'){
      if(prevActual){
        // كان مكتملاً سابقاً وله تاريخ فعلي محفوظ ⇒ احتفظ به كما هو،
        // إلا إذا غيّره المخوّل يدوياً عمداً إلى قيمة مختلفة وصحيحة
        data[key].actualDate = (incoming && incoming!==prevActual) ? incoming : prevActual;
      }else{
        // أول مرة يكتمل فيها هذا القسم ⇒ ثبّت تاريخ اليوم (أو ما أدخله المخوّل)
        data[key].actualDate = incoming || todayStr;
      }
    }else{
      data[key].actualDate = '';   // غير مكتمل ⇒ لا تاريخ فعلي
    }
  }
  // ── نقل تلقائي إلى «المشاريع المنتهية» ──
  // أي مشروع تكتمل كل أقسامه المُسنَدة (التي لها مهندس) يُعتبر منتهياً تلقائياً،
  // بغضّ النظر عن الحالة العامة (فكرة مبدئية/خرائط تفصيلية...). شرط: وجود قسم مُسنَد واحد على الأقل.
  // «فكرة مبدئية» = المعماري وحده هو المعتبر. المشروع الذي لم تُسنَد بعض أقسامه لا يُنقل.
  try{
    const isAssigned=(sec)=> !!sec && Array.isArray(sec.engineers) && sec.engineers.length>0;
    const isDone=(sec)=> !!sec && sec.status==='مكتمل';
    const manualHold = (data.overallStatus==='متوقف الى اشعار اخر' || data.overallStatus==='الغي المشروع' || data.overallStatus==='رأي فني');
    let consider;
    if(data.overallStatus==='فكرة مبدئية'){
      consider=['architectural'];   // الفكرة المبدئية من اختصاص المعماري وحده
    }else{
      consider=['architectural','structural','services'];
    }
    const assigned = consider.filter(k=>isAssigned(data[k]));
    const allAssignedDone = assigned.length>0 && assigned.every(k=>isDone(data[k]));
    if(allAssignedDone && !manualHold){
      data.overallStatus='مكتمل';
    }
  }catch(e){ console.error('نقل تلقائي للمنتهية:',e); }
  const payload={...data,lastUpdatedBy:state.appUser.name,lastUpdatedAt:new Date().toLocaleString('ar-OM'),updatedAtTS:nowISO};
  if(editingId){await FB.updateDoc(FB.doc(db,'artifacts',APP_ID,'public','data','projects',editingId),payload);logActivity('update');}
  else{await FB.addDoc(colRef(),{...payload,createdAt:nowISO});logActivity('create');}
  // اكتشف الأقسام التي تحوّلت إلى «مكتمل» حديثاً وأنشئ إشعاراً لرئيس كل قسم
  try{ detectCompletions(payload, prev); }catch(e){ console.error("إشعار الإنجاز:",e); }
}
const HEAD_TITLES={architectural:'رئيس القسم المعماري',structural:'رئيس القسم الإنشائي',services:'رئيس قسم تصميم الخدمات'};
const DEPT_AR={architectural:'القسم المعماري',structural:'القسم الإنشائي',services:'قسم تصميم الخدمات'};
/* يجد حساب رئيس القسم من مسماه الوظيفي */
function findHead(deptKey){
  return state.users.find(u=>u.jobTitle===HEAD_TITLES[deptKey]) || null;
}
async function detectCompletions(payload, prev){
  for(const key of ['architectural','structural','services']){
    const now=payload[key]?.status, before=prev? (prev[key]?.status) : undefined;
    if(now==='مكتمل' && before!=='مكتمل'){
      const head=findHead(key);
      if(head){
        await addNotif({
          toUser:head.username, toRole:'head', deptKey:key,
          projectName:payload.name||'', engineer:payload[key]?.engineer||state.appUser.name,
          byUser:state.appUser.name,
          text:`أنجز ${payload[key]?.engineer||state.appUser.name} العمل في «${DEPT_AR[key]}» لمشروع «${payload.name}».`
        });
      }
      // اعرض للمهندس زر بريد جاهز لرئيس القسم
      offerCompletionEmail(key, payload, head);
      // أبلغ مهندسي الأقسام الأخرى في نفس المشروع
      await notifyOtherDeptsEngineers(key, payload);
    }
  }
}
/* أسماء مستخدمي مهندسي قسم في مشروع */
function sectionEngineerUsernames(sec){
  if(!sec) return [];
  if(Array.isArray(sec.engineers)) return sec.engineers.map(e=>e.username).filter(Boolean);
  if(sec.engineerUsername) return [sec.engineerUsername];
  return [];
}
/* يُشعِر مهندسي الأقسام الأخرى في نفس المشروع بأن قسماً أنجز عمله */
async function notifyOtherDeptsEngineers(completedKey, payload){
  const me=state.appUser?.username;
  const completedLabel=DEPT_AR[completedKey];
  const link=(payload[completedKey]?.workLink||'').trim();
  const linkHint = link ? ' (رابط مسار العمل متاح في البطاقة)' : '';
  const recipients=new Set();
  for(const key of ['architectural','structural','services']){
    if(key===completedKey) continue;
    sectionEngineerUsernames(payload[key]).forEach(un=>{ if(un && un!==me) recipients.add(un); });
  }
  for(const un of recipients){
    await addNotif({
      toUser:un, toRole:'engineer', deptKey:completedKey,
      projectName:payload.name||'', byUser:state.appUser.name,
      text:`أُنجز عمل «${completedLabel}» في مشروع «${payload.name}»${linkHint}. يمكنك متابعة عمل قسمك بناءً عليه.`
    });
  }
}
/* يفتح بريداً جاهزاً لرئيس القسم (يرسله المرسِل بضغطة) */
function offerCompletionEmail(deptKey, payload, head){
  const to = head && head.email ? head.email : '';
  const subject=`إنجاز عمل: ${payload.name} — ${DEPT_AR[deptKey]}`;
  // أسماء المهندسين المسؤولين عن القسم (إن وُجدوا)
  const engNames = payload[deptKey]?.engineer || '';
  // المرسِل: الجميع يحمل لقب «المهندس» إلا موظف التنسيق والمتابعة (إداري)
  const u=state.appUser||{};
  const isCoordinator = (u.jobTitle||'')==='تنسيق ومتابعة';
  const senderLine = isCoordinator ? `الموظف: ${u.name||''}` : `المهندس: ${u.name||''}`;
  const NL=String.fromCharCode(10);
  const engLine = engNames ? `${NL}المهندس المسؤول: ${engNames}` : '';
  const noLine = (payload.projectNo||'').trim() ? `${NL}رقم المشروع: ${payload.projectNo}` : '';
  const link = (payload[deptKey]?.workLink||'').trim();
  const linkLine = link ? `${NL}${NL}رابط مسار العمل (مجلّد القسم على الشبكة):${NL}${link}` : '';
  const body=`السلام عليكم ورحمة الله وبركاته،${NL}${NL}أفيدكم بأنه تم الانتهاء من العمل في «${DEPT_AR[deptKey]}» الخاص بمشروع «${payload.name}».${noLine}${engLine}${NL}تاريخ التسليم المتوقع: ${payload[deptKey]?.endDate||'—'}${linkLine}${NL}${NL}${senderLine}${NL}وتفضلوا بقبول فائق الاحترام والتقدير.`;
  const mailto=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  // نافذة تأكيد صغيرة بدل فتح البريد فجأة
  const overlay=$(`<div class="overlay"></div>`);
  const modal=$(`<div class="modal modal-sm"><div class="modal-head"><h2>إبلاغ رئيس القسم</h2>
    <button class="icon-btn" id="x">${I.close}</button></div></div>`);
  const b=document.createElement('div'); b.className='modal-body';
  b.innerHTML=`
    <p style="font-size:13.5px;line-height:1.8;color:var(--ink)">تم تعليم «${DEPT_AR[deptKey]}» كمكتمل في مشروع «${payload.name}».</p>
    ${to?`<p style="font-size:13px;color:var(--muted);margin-top:8px">يمكنك إرسال إشعار بالبريد إلى رئيس القسم (${to}). سيفتح تطبيق البريد برسالة جاهزة، تضغط «إرسال» فقط.</p>`
        :`<p style="font-size:13px;color:var(--danger);margin-top:8px">لا يوجد بريد مسجّل لرئيس هذا القسم. أبلغ المشرف لإضافته. (تم تسجيل إشعار داخلي على أي حال.)</p>`}
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" id="later">لاحقاً</button>
      ${to?`<a class="btn btn-add" id="sendmail" href="${mailto}">${I.report} فتح البريد الجاهز</a>`:''}
    </div>`;
  b.querySelector('#later').onclick=()=>overlay.remove();
  if(to){ b.querySelector('#sendmail').onclick=()=>{ setTimeout(()=>overlay.remove(),300); }; }
  modal.querySelector('#x').onclick=()=>overlay.remove();
  modal.appendChild(b); overlay.appendChild(modal);
  overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove();};
  root.appendChild(overlay);
}

/* حذف عام: ينقل أي عنصر (مشروع/زيارة/اجتماع) إلى السلة مع نوعه ومن حذفه */
async function softDelete(kind, id){
  try{
    const src = kind==='project'?state.projects : kind==='visit'?state.visits : state.meetings;
    const item=src.find(x=>x.id===id);
    if(item){
      const {id:_omit,...rest}=item;
      await FB.setDoc(FB.doc(db,'artifacts',APP_ID,'public','data','trash',`${kind}_${id}`),
        {...rest, _kind:kind, _origId:id, deletedAt:new Date().toISOString(),
         deletedBy:state.appUser?.name||'—', deletedByUser:state.appUser?.username||'', deletedByAdmin:state.appUser?.role==='admin'});
    }
    await FB.deleteDoc(FB.doc(db,'artifacts',APP_ID,'public','data',KIND_COLL[kind],id));
  }catch(e){ console.error('حذف:',e); alert('تعذّر الحذف.'); }
}
async function deleteProject(id){ return softDelete('project', id); }
async function restoreFromTrash(trashId){
  try{
    const t=state.trash.find(x=>x.id===trashId); if(!t) return;
    const {id:_o,_kind,_origId,deletedAt,deletedBy,deletedByUser,deletedByAdmin,...rest}=t;
    const coll=KIND_COLL[_kind]||'projects';
    await FB.setDoc(FB.doc(db,'artifacts',APP_ID,'public','data',coll,_origId),rest);
    await FB.deleteDoc(FB.doc(db,'artifacts',APP_ID,'public','data','trash',trashId));
  }catch(e){ console.error('استرجاع:',e); alert('تعذّر الاسترجاع.'); }
}
async function deleteFromTrash(trashId){
  try{ await FB.deleteDoc(FB.doc(db,'artifacts',APP_ID,'public','data','trash',trashId)); }
  catch(e){ console.error(e); alert('تعذّر الحذف النهائي.'); }
}
async function emptyTrash(){
  try{
    // المشرف يفرّغ الكل؛ غيره يفرّغ محذوفاته فقط
    const mine = myTrash();
    const batch=FB.writeBatch(db);
    mine.forEach(t=>batch.delete(FB.doc(db,'artifacts',APP_ID,'public','data','trash',t.id)));
    await batch.commit();
  }catch(e){ console.error(e); alert('تعذّر تفريغ السلة.'); }
}
/* محذوفات المستخدم الحالي: المشرف يرى الكل، وغيره يرى ما حذفه هو */
function myTrash(){
  const u=state.appUser; if(!u) return [];
  if(u.role==='admin') return state.trash;
  return state.trash.filter(t=>t.deletedByUser===u.username);
}

function render(){
  root.innerHTML='';
  if(!state.appUser){root.appendChild(renderAuth());}
  else{root.appendChild(renderApp());}
  root.dataset.ok='1';
}

function renderAuth(){
  const lastUser=loadLastUser();
  const wrap=$(`<div class="auth-wrap" style="background-image:url('${BG_BUILDING}')"><div class="auth-overlay"></div></div>`);
  const card=$(`<div class="auth-card">
    <div class="auth-logo">
      <div class="auth-crest"><img src="${LOGO_DARK}" alt="بلدية مسقط"></div>
      <h1>مشاريع التصميم المركزي</h1>
      <div class="sub">المديرية العامة للشؤون الفنية — بلدية مسقط</div>
    </div>
  </div>`);
  if(state.authError) card.appendChild($(`<div class="err">${state.authError}</div>`));

  const form=document.createElement('form');
  form.innerHTML = `
    <div class="field"><label>اسم المستخدم</label><input class="ltr" type="text" name="username" required placeholder="username" value="${lastUser}"></div>
    <div class="field"><label>الرقم السري</label><input class="ltr" type="password" name="password" required ${lastUser?'autofocus':''}></div>
    <button class="btn-primary" type="submit" ${state.loading?'disabled':''}>
      ${state.loading?'<div class="spinner"></div>':'تسجيل الدخول'}
    </button>`;
  form.onsubmit=(e)=>{e.preventDefault();handleAuth(form);};
  card.appendChild(form);

  card.appendChild($(`<div style="text-align:center;margin-top:18px;font-size:12px;color:var(--muted)">
    للحصول على حساب، تواصل مع المشرف العام.</div>`));

  wrap.appendChild(card);
  return wrap;
}
