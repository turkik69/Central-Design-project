/* تصدير لوحة المؤشرات إلى Excel (بيانات جدولية منسّقة) */
function exportKpiExcel(){
  if(!window.XLSX){ alert('تعذّر تحميل أداة Excel، حاول لاحقاً.'); return; }
  const X=window.XLSX;
  const today=new Date();
  const dStr=`${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;
  const OASIS='1F5D4C', SAND='F3EEE3';
  const deptData=DEPT_MAP.map(([key,label])=>({label,k:deptKpi(key)}));
  const engs=engineerKpiList();
  const allDone=deptData.reduce((s,d)=>s+d.k.done,0), allTotal=deptData.reduce((s,d)=>s+d.k.total,0);
  const onTimeAll=deptData.reduce((s,d)=>s+d.k.onTime,0), lateAll=deptData.reduce((s,d)=>s+d.k.late,0);
  const orgCompletion=allTotal?Math.round(allDone/allTotal*100):0;
  const orgPunctual=(onTimeAll+lateAll)?Math.round(onTimeAll/(onTimeAll+lateAll)*100):'—';
  const ratedDepts=deptData.filter(d=>d.k.avgRating);
  const orgRating=ratedDepts.length?(ratedDepts.reduce((s,d)=>s+Number(d.k.avgRating),0)/ratedDepts.length).toFixed(1):'—';

  const aoa=[
    ['سلطنة عُمان — بلدية مسقط'],['المديرية العامة للشؤون الفنية'],['نظام مشاريع التصميم المركزي'],
    ['لوحة مؤشرات الأداء (KPIs)'],[`الفترة: ${kpiRange(kpiPeriod).label}`],[`تاريخ التصدير: ${dStr}`],[],
    ['مؤشرات الدائرة العامة'],
    ['إجمالي المشاريع','المكتملة','نسبة الإنجاز %','الالتزام بالوقت %','متوسط التقييم'],
    [state.projects.length, state.projects.filter(p=>p.overallStatus==='مكتمل').length, orgCompletion, orgPunctual, orgRating],
    [],
    ['مؤشرات الأقسام'],
    ['القسم','الإجمالي','المنجز','قيد العمل','نسبة الإنجاز %','الالتزام بالوقت %','متوسط التأخير (يوم)','متوسط التقييم'],
    ...deptData.map(d=>[d.label,d.k.total,d.k.done,d.k.wip,d.k.completion,(d.k.punctuality==null?'—':d.k.punctuality),(d.k.avgDelay||'—'),(d.k.avgRating||'—')]),
    [],
    ['مؤشرات المهندسين'],
    ['المهندس','الرقم الوظيفي','الأعمال','المنجز','منها آراء فنية','نسبة الإنجاز %','الالتزام بالوقت %','متوسط التقييم'],
    ...engs.map(e=>[e.name,e.username,e.total,e.done,(e.opinionCount||0),e.completion,(e.punctuality==null?'—':e.punctuality),(e.avgRating||'—')])
  ];
  const ws=X.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:26},{wch:16},{wch:12},{wch:14},{wch:16},{wch:18},{wch:16},{wch:14}];
  ws['!views']=[{RTL:true}];
  const enc=(r,c)=>X.utils.encode_cell({r,c});
  const setS=(a,s)=>{ if(ws[a]) ws[a].s=s; };
  // عناوين الأقسام (الصفوف 6،10،15 تقريباً) — نلوّنها ديناميكياً بالبحث عن النص
  aoa.forEach((row,r)=>{
    if(row.length===1 && r>=6){ // عنوان قسم
      ws['!merges']=ws['!merges']||[];
      ws['!merges'].push({s:{r,c:0},e:{r,c:7}});
      setS(enc(r,0),{font:{bold:true,sz:13,color:{rgb:OASIS}},fill:{fgColor:{rgb:SAND}},alignment:{horizontal:'right'}});
    }
  });
  // ترويسة علوية (٦ صفوف: الدولة/المديرية/النظام/العنوان/الفترة/التاريخ)
  ws['!merges']=ws['!merges']||[];
  for(let r=0;r<6;r++) ws['!merges'].push({s:{r,c:0},e:{r,c:7}});
  setS('A1',{font:{bold:true,sz:15,color:{rgb:OASIS}},alignment:{horizontal:'center'}});
  setS('A2',{font:{bold:true,sz:12,color:{rgb:'5E574A'}},alignment:{horizontal:'center'}});
  setS('A3',{font:{bold:true,sz:13,color:{rgb:OASIS}},alignment:{horizontal:'center'}});
  setS('A4',{font:{bold:true,sz:13,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:OASIS}},alignment:{horizontal:'center'}});
  setS('A5',{font:{bold:true,sz:11,color:{rgb:OASIS}},alignment:{horizontal:'center'}});
  setS('A6',{font:{sz:10,color:{rgb:'8A8170'}},alignment:{horizontal:'center'}});
  // رؤوس الجداول الثلاثة (بعد إضافة صف الفترة)
  [8,12,17].forEach(hr=>{ for(let c=0;c<8;c++){ const a=enc(hr,c); if(ws[a]) setS(a,{font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{fgColor:{rgb:OASIS}},alignment:{horizontal:'center'}});} });
  const wb=X.utils.book_new();
  X.utils.book_append_sheet(wb,ws,'مؤشرات الأداء');
  X.writeFile(wb,`لوحة_مؤشرات_الأداء_${dStr.replace(/\//g,'-')}.xlsx`);
}

/* ════════════ التقارير الشهرية ════════════ */
let reportsModalOpen=false;
const DEPT_MAP=[['architectural','القسم المعماري','arch'],['structural','القسم الإنشائي','str'],['services','قسم تصميم الخدمات','srv']];
const MONTH_NAMES=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
/* يستخرج YYYY-MM من تاريخ تسليم القسم */
function ym(dateStr){ return (dateStr && dateStr.length>=7) ? dateStr.slice(0,7) : null; }
/* تسمية الشهر من YYYY-MM (نسخة مستقلة للمصدّرات) */
function monthLabelStd(m){
  if(!m) return ''; const [y,mo]=m.split('-'); return `${MONTH_NAMES[Number(mo)-1]||''} ${y}`;
}
/* يبني محتوى HTML للتقرير حسب النوع والشهر (يُستخدم لـ PDF و Word) */
function buildReportHTML(selType, selMonth){
  const label=monthLabelStd(selMonth);
  const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let out='';
  // جدول المشاريع
  if(selType==='projects' || selType==='all'){
    const doneRows=[], wipRows=[];
    DEPT_MAP.forEach(([key,label])=>{
      state.projects.filter(p=>ym(p[key]?.endDate)===selMonth && p[key]?.status==='مكتمل')
        .forEach(p=>doneRows.push([label,p.name||'',p.projectNo||'',p[key]?.engineer||'',p.requestingEntity||'',p[key]?.startDate||'',p[key]?.endDate||'',p[key]?.actualDate||'']));
      state.projects.filter(p=>p[key]?.status==='قيد العمل')
        .forEach(p=>wipRows.push([label,p.name||'',p.projectNo||'',p[key]?.engineer||'',p.requestingEntity||'',p[key]?.startDate||'',p[key]?.endDate||'','—']));
    });
    const head=['القسم','المشروع','الرقم','المهندس','الجهة','الاستلام','المتوقع','الفعلي'];
    const tbl=(rows)=> rows.length? `<table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>` : '<p class="empty">لا توجد بيانات.</p>';
    out+=`<h2>تقرير المشاريع — ${esc(label)}</h2>
      <h3>الأعمال المنجزة هذا الشهر (${doneRows.length})</h3>${tbl(doneRows)}
      <h3>المشاريع قيد العمل حالياً (${wipRows.length})</h3>${tbl(wipRows)}`;
  }
  // الاجتماعات
  if(selType==='meetings' || selType==='all'){
    const list=state.meetings.filter(m=>ym(m.date)===selMonth).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const head=['الاسم','القسم','الأشخاص','التاريخ','الموقع','الغرض','المحضر'];
    const tbl=list.length? `<table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${list.map(m=>`<tr>${[m.title,m.deptLabel,m.personNames,m.date,m.location,m.purpose,m.minutes].map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<p class="empty">لا توجد اجتماعات.</p>';
    out+=`<h2>تقرير الاجتماعات — ${esc(label)}</h2>${tbl}`;
  }
  // الزيارات
  if(selType==='visits' || selType==='all'){
    const list=state.visits.filter(v=>ym(v.date)===selMonth).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const head=['الموقع/الولاية','القسم','الأشخاص','التاريخ','الغرض','ملاحظات'];
    const tbl=list.length? `<table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${list.map(v=>`<tr>${[v.location,v.deptLabel,v.personNames,v.date,v.purpose,v.notes].map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<p class="empty">لا توجد زيارات.</p>';
    out+=`<h2>تقرير الزيارات الميدانية — ${esc(label)}</h2>${tbl}`;
  }
  return out;
}
/* أنماط مشتركة لمستندات التقارير */

    .hd{background:#16443a;color:#fff;padding:18px 22px;border-radius:10px;margin:0 0 18px;display:flex;justify-content:space-between;align-items:center}

/* تصدير التقرير PDF عبر نافذة طباعة فيها زرّا طباعة ورجوع */
function exportReportPdf(selType, selMonth){
  const content=buildReportHTML(selType, selMonth);
  const today=new Date();
  const dStr=`${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;
  const win=window.open('','_blank');
  if(!win){ alert('فضلاً اسمح بالنوافذ المنبثقة لتصدير PDF.'); return; }
  win.document.write(`<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>التقرير الشهري</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>@page{size:A4;margin:12mm}${reportDocStyles()}
      .toolbar{position:fixed;top:0;left:0;right:0;background:#16443a;display:flex;gap:10px;justify-content:center;padding:11px;z-index:99}
      .toolbar button{font-family:'Tajawal';font-size:14px;font-weight:700;border:none;border-radius:9px;padding:9px 18px;cursor:pointer}
      .b-print{background:#fff;color:#16443a}.b-back{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.6)}
      .spacer{height:60px}@media print{.toolbar,.spacer{display:none!important}body{padding:0}}
    </style></head><body>
    <div class="toolbar"><button class="b-print" onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
      <button class="b-back" onclick="window.close()">رجوع للبرنامج ✕</button></div>
    <div class="spacer"></div>
    <div style="padding:0 14px"><div class="hd"><div><h1>التقرير الشهري</h1>
      <div class="sub">نظام مشاريع التصميم المركزي — بلدية مسقط</div></div>
      <div class="sub">تاريخ التصدير: ${dStr}</div></div>${content}</div>
    </body></html>`);
  win.document.close(); win.focus();
}
/* تصدير التقرير Word (.doc) — Word يفتح HTML بامتداد doc مع دعم RTL */
function exportReportWord(selType, selMonth){
  const content=buildReportHTML(selType, selMonth);
  const today=new Date();
  const dStr=`${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;
  const label=monthLabelStd(selMonth);
  const html=`<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="utf-8">
    <style>${reportDocStyles()}</style></head><body>
    <div class="hd"><div><h1>التقرير الشهري — ${label}</h1>
      <div class="sub">نظام مشاريع التصميم المركزي — بلدية مسقط</div></div>
      <div class="sub">تاريخ التصدير: ${dStr}</div></div>${content}</body></html>`;
  const blob=new Blob(['\ufeff'+html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`التقرير_الشهري_${label.replace(/ /g,'_')}.doc`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

function openReportsModal(){
  if(document.getElementById('reportsOverlay')) return;
  reportsModalOpen=true;
  // الشهر الافتراضي: الحالي
  const now=new Date();
  let selMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  let selType='projects';   // نوع التقرير: projects | meetings | visits | all

  const overlay=$(`<div class="overlay" id="reportsOverlay"></div>`);
  const modal=$(`<div class="modal"><div class="modal-head"><h2>التقارير الشهرية</h2>
    <button class="icon-btn" id="x">${I.close}</button></div></div>`);
  const body=document.createElement('div');body.className='modal-body';
  modal.appendChild(body);overlay.appendChild(modal);

  function monthLabel(m){
    if(!m) return '';
    const [y,mo]=m.split('-'); return `${MONTH_NAMES[Number(mo)-1]} ${y}`;
  }
  function fill(){
    // اجمع كل الأشهر المتاحة من تواريخ تسليم الأقسام

    state.projects.forEach(p=>DEPT_MAP.forEach(([k])=>{ const m=ym(p[k]?.endDate); if(m) monthsSet.add(m); }));

      : `<option value="">لا توجد بيانات</option>`;

    // جمع البيانات للشهر المحدد، لكل قسم
    const canExport = (state.appUser.role==='admin') || ((state.appUser.jobTitle||'')==='تنسيق ومتابعة');
    let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap">
        <label class="lbl-sm" style="margin:0">نوع التقرير:</label>
        <select class="inp" id="repType" style="width:auto;min-width:150px">
          <option value="projects" ${selType==='projects'?'selected':''}>المشاريع</option>
          <option value="meetings" ${selType==='meetings'?'selected':''}>الاجتماعات</option>
          <option value="visits" ${selType==='visits'?'selected':''}>الزيارات الميدانية</option>
          <option value="all" ${selType==='all'?'selected':''}>الكل في ملف واحد</option>
        </select>
        <label class="lbl-sm" style="margin:0">الشهر:</label>
        <select class="inp" id="repMonth" style="width:auto;min-width:150px">${monthOpts}</select>
        ${canExport?`<span style="display:flex;gap:6px;margin-right:auto">
          <button class="btn btn-add" id="repExport" style="padding:8px 12px">${I.upload} Excel</button>
          <button class="btn btn-ghost" id="repPdf" style="padding:8px 12px">${I.report} PDF</button>
          <button class="btn btn-ghost" id="repWord" style="padding:8px 12px">${I.report} Word</button>
        </span>`:''}
      </div>`;

    if(!months.length && selType==='projects'){
      html+=`<div style="text-align:center;padding:40px 20px;color:var(--muted)">
        لا توجد مشاريع لها تاريخ تسليم بعد. عبّئ تواريخ التسليم في الأقسام لتظهر التقارير الشهرية.</div>`;
      body.innerHTML=html; bindMonth(); return;

      DEPT_MAP.forEach(([key,label])=>{

        const rated=state.projects.filter(p=>ym(p[key]?.endDate)===selMonth && p[key]?.eval && ratingAvg(p[key].eval));

        rated.forEach(p=>{ ['quality','requirements','communication','challenges','delay'].forEach(c=>{const v=Number(p[key].eval[c]); if(v>=1&&v<=5) crit[c].push(v);}); });
        const avgOf=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):'—';
        const overall=rated.length?(rated.reduce((s,p)=>s+Number(ratingAvg(p[key].eval)),0)/rated.length).toFixed(1):null;
        html+=`<div style="background:var(--sand-50);border:1px solid var(--line);border-radius:11px;padding:13px;margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${rated.length?'9px':'0'}">
            <span style="font-weight:700;color:var(--oasis-700)">${label}</span>
            <span style="font-weight:800;color:var(--stop)">${overall?overall+' ★':'لا يوجد تقييم'}</span>
          </div>
          ${rated.length?`<div style="font-size:12px;color:var(--muted);display:grid;grid-template-columns:1fr 1fr;gap:5px">
            ${Object.entries(critLabels).map(([c,l])=>`<span>${l}: <b style="color:var(--ink)">${avgOf(crit[c])}</b></span>`).join('')}
          </div><div style="font-size:11px;color:var(--muted);margin-top:7px">عدد المشاريع المقيَّمة: ${rated.length}</div>`:''}
        </div>`;
      });
    }
    html+=`<p style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.7">
      يعتمد التقرير على تاريخ تسليم كل قسم. المشاريع تظهر في شهر تسليمها.</p>`;

    if(selType==='all'){
      html+=`<div class="divider"></div>`+renderMeetingsReport(meetingsThisMonth, monthLabel(selMonth));
      html+=`<div class="divider"></div>`+renderVisitsReport(visitsThisMonth, monthLabel(selMonth));
    }

    body.innerHTML=html; bindMonth();
  }
  function bindMonth(){
    const sel=body.querySelector('#repMonth');
    if(sel) sel.onchange=()=>{ selMonth=sel.value; fill(); };
    const ts=body.querySelector('#repType');
    if(ts) ts.onchange=()=>{ selType=ts.value; fill(); };
    const exp=body.querySelector('#repExport');
    if(exp) exp.onclick=()=>{ if(overlay._exportExcel) overlay._exportExcel(); };
    const pdfB=body.querySelector('#repPdf');
    if(pdfB) pdfB.onclick=()=>exportReportPdf(selType, selMonth);
    const wordB=body.querySelector('#repWord');
    if(wordB) wordB.onclick=()=>exportReportWord(selType, selMonth);
  }
  fill();
  overlay._refresh=fill;
  modal.querySelector('#x').onclick=()=>{reportsModalOpen=false;overlay.remove();};
  overlay.onclick=(e)=>{if(e.target===overlay){reportsModalOpen=false;overlay.remove();}};
  root.appendChild(overlay);

  // تصدير التقرير حسب النوع المختار إلى Excel
  overlay._exportExcel=()=>{
    if(!window.XLSX){alert('تعذّر تحميل أداة Excel، حاول لاحقاً.');return;}
    const X=window.XLSX;
    const today=new Date();
    const exportDate=`${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;
    const OASIS='1F5D4C', SAND='F3EEE3', CLAY='8A6D2F';
    const monthName=monthLabel(selMonth);

    // يبني ورقة عمل منسّقة من عنوان التقرير + أقسام (كل قسم: عنوان + رؤوس أعمدة + صفوف)
    function buildSheet(reportTitle, COLS, sections){
      const aoa=[
        ['سلطنة عُمان — بلدية مسقط'],
        ['المديرية العامة للشؤون الفنية'],
        ['نظام مشاريع التصميم المركزي'],
        [reportTitle],
        [`الشهر: ${monthName}`],
        [`تاريخ استخراج الملف: ${exportDate}`],
        []
      ];
      const titleRows=aoa.length;
      const sectionHeadRows=[], colHeadRows=[], totalRows=[];
      sections.forEach(sec=>{
        sectionHeadRows.push(aoa.length); aoa.push([sec.title]);
        colHeadRows.push(aoa.length); aoa.push(sec.headers.slice());
        if(sec.rows.length){ sec.rows.forEach(r=>aoa.push(r)); }
        else { aoa.push(['— لا توجد بيانات —']); }
        totalRows.push(aoa.length); aoa.push([`الإجمالي: ${sec.rows.length}`]);
        aoa.push([]);
      });
      const ws=X.utils.aoa_to_sheet(aoa);
      ws['!cols']=Array.from({length:COLS},(_,i)=>({wch:i===1?28:18}));
      ws['!views']=[{RTL:true}];
      const enc=(r,c)=>X.utils.encode_cell({r,c});
      const setS=(a,s)=>{ if(ws[a]) ws[a].s=s; };
      const merges=[];
      for(let r=0;r<titleRows-1;r++) merges.push({s:{r,c:0},e:{r,c:COLS-1}});
      sectionHeadRows.concat(totalRows).forEach(r=>merges.push({s:{r,c:0},e:{r,c:COLS-1}}));
      ws['!merges']=merges;
      setS('A1',{font:{bold:true,sz:15,color:{rgb:OASIS}},alignment:{horizontal:'center'}});
      setS('A2',{font:{bold:true,sz:12,color:{rgb:'5E574A'}},alignment:{horizontal:'center'}});
      setS('A3',{font:{bold:true,sz:13,color:{rgb:OASIS}},alignment:{horizontal:'center'}});
      setS('A4',{font:{bold:true,sz:13,color:{rgb:'FFFFFF'}},alignment:{horizontal:'center'},fill:{fgColor:{rgb:OASIS}}});
      setS('A5',{font:{bold:true,sz:11},alignment:{horizontal:'center'}});
      setS('A6',{font:{sz:10,color:{rgb:'8A8170'}},alignment:{horizontal:'center'}});
      sectionHeadRows.forEach(r=>setS(enc(r,0),{font:{bold:true,sz:12,color:{rgb:OASIS}},alignment:{horizontal:'right'},fill:{fgColor:{rgb:SAND}}}));
      colHeadRows.forEach(hr=>{ for(let c=0;c<COLS;c++) setS(enc(hr,c),{font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{fgColor:{rgb:OASIS}},alignment:{horizontal:'center'}}); });
      totalRows.forEach(r=>setS(enc(r,0),{font:{bold:true,color:{rgb:CLAY}},alignment:{horizontal:'right'}}));
      const special=new Set([...sectionHeadRows,...colHeadRows,...totalRows]);
      for(let r=titleRows;r<aoa.length;r++){ if(special.has(r))continue; for(let c=0;c<COLS;c++) if(ws[enc(r,c)]) ws[enc(r,c)].s={alignment:{horizontal:'center'}}; }
      return ws;
    }

    // أوراق كل نوع
    function projectsSheet(){
      const headers=['القسم','اسم المشروع','المهندس','الجهة الطالبة','تاريخ الاستلام','تاريخ التسليم المتوقع','تاريخ التسليم الفعلي','الحالة'];
      const doneRows=[], wipRows=[];
      DEPT_MAP.forEach(([key,label])=>{
        state.projects.filter(p=>ym(p[key]?.endDate)===selMonth && p[key]?.status==='مكتمل')
          .forEach(p=>doneRows.push([label,p.name||'',p[key]?.engineer||'',p.requestingEntity||'',p[key]?.startDate||'',p[key]?.endDate||'',p[key]?.actualDate||'',p[key]?.status||'']));
        state.projects.filter(p=>p[key]?.status==='قيد العمل')
          .forEach(p=>wipRows.push([label,p.name||'',p[key]?.engineer||'',p.requestingEntity||'',p[key]?.startDate||'',p[key]?.endDate||'','',p[key]?.status||'']));
      });
      return buildSheet('تقرير المشاريع',8,[
        {title:`الأعمال المنجزة — ${monthName}`,headers,rows:doneRows},
        {title:'المشاريع قيد العمل حالياً (استُلمت ولم تكتمل)',headers,rows:wipRows}
      ]);
    }
    function meetingsSheet(){
      const headers=['اسم الاجتماع','القسم','الأشخاص','التاريخ','الموقع','الغرض','ملاحظات'];
      const rows=state.meetings.filter(m=>ym(m.date)===selMonth).sort((a,b)=>new Date(a.date)-new Date(b.date))
        .map(m=>[m.title||'',m.deptLabel||'',m.personNames||'',m.date||'',m.location||'',m.purpose||'',m.notes||'']);
      return buildSheet('تقرير الاجتماعات',7,[{title:`الاجتماعات — ${monthName}`,headers,rows}]);
    }
    function visitsSheet(){
      const headers=['الموقع / الولاية','القسم','الأشخاص','التاريخ','الغرض','ملاحظات'];
      const rows=state.visits.filter(v=>ym(v.date)===selMonth).sort((a,b)=>new Date(a.date)-new Date(b.date))
        .map(v=>[v.location||'',v.deptLabel||'',v.personNames||'',v.date||'',v.purpose||'',v.notes||'']);
      return buildSheet('تقرير الزيارات الميدانية',6,[{title:`الزيارات الميدانية — ${monthName}`,headers,rows}]);
    }

    const wb=X.utils.book_new();
    let fname='تقرير';
    if(selType==='projects'){ X.utils.book_append_sheet(wb,projectsSheet(),'المشاريع'); fname='تقرير_المشاريع'; }
    else if(selType==='meetings'){ X.utils.book_append_sheet(wb,meetingsSheet(),'الاجتماعات'); fname='تقرير_الاجتماعات'; }
    else if(selType==='visits'){ X.utils.book_append_sheet(wb,visitsSheet(),'الزيارات'); fname='تقرير_الزيارات'; }
    else { // الكل في ملف واحد (عدة أوراق)
      X.utils.book_append_sheet(wb,projectsSheet(),'المشاريع');
      X.utils.book_append_sheet(wb,meetingsSheet(),'الاجتماعات');
      X.utils.book_append_sheet(wb,visitsSheet(),'الزيارات');
      fname='التقرير_الشامل';
    }
    X.writeFile(wb,`${fname}_${monthName}.xlsx`);
  };
}

/* ════════════ لوحة إحصاءات النشاط (للمشرف) ════════════ */
let statsModalOpen=false;
function fmtDate(iso){
  if(!iso) return '—';
  try{ return new Date(iso).toLocaleString('ar-OM',{dateStyle:'medium',timeStyle:'short'}); }
  catch(e){ return '—'; }
}
/* تنسيق تاريخ YYYY-MM-DD إلى dd/mm/yyyy بلا لبس */
function dmy(iso){
  if(!iso) return '';
  const m=String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return '';
  return `${m[3]}/${m[2]}/${m[1]}`;
}
function daysSince(iso){
  if(!iso) return null;
  return Math.floor((Date.now()-new Date(iso).getTime())/86400000);
}
function openStatsModal(){
  if(document.getElementById('statsOverlay')) return;
  statsModalOpen=true;

    <button class="icon-btn" id="x">${I.close}</button></div></div>`);

  modal.appendChild(body);overlay.appendChild(modal);

  function fill(){

    const rows=state.stats.filter(s=>s.role!=='admin')
      .sort((a,b)=> (b.updates+b.creates)-(a.updates+a.creates));
    const totalUpdates=rows.reduce((s,r)=>s+(r.updates||0)+(r.creates||0),0);
    const activeCount=rows.filter(r=>{const d=daysSince(r.lastActivity);return d!==null&&d<=7;}).length;

    let html=`
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px">
        <div style="background:var(--oasis-50);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center">

          <div style="font-size:12px;color:var(--muted)">إجمالي المهندسين</div></div>
        <div style="background:var(--ok-bg);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:26px;font-weight:800;color:var(--ok);font-family:'Cairo'">${activeCount}</div>
          <div style="font-size:12px;color:var(--muted)">نشط آخر ٧ أيام</div></div>
        <div style="background:var(--work-bg);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:26px;font-weight:800;color:var(--work);font-family:'Cairo'">${totalUpdates}</div>
          <div style="font-size:12px;color:var(--muted)">إجمالي التحديثات</div></div>
      </div>`;

    if(!rows.length){
      html+=`<div style="text-align:center;padding:40px 20px;color:var(--muted)">
        لم يسجّل أي مهندس دخوله بعد. ستظهر الإحصاءات هنا فور بدء الفريق باستخدام النظام.</div>`;
    }else{
      html+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="text-align:right;color:var(--muted);border-bottom:2px solid var(--line)">
          <th style="padding:9px 6px">المهندس</th>
          <th style="padding:9px 6px">الدخول</th>
          <th style="padding:9px 6px">مشاريع أنشأها</th>
          <th style="padding:9px 6px">تحديثات</th>
          <th style="padding:9px 6px">آخر نشاط</th>
        </tr></thead><tbody>`;
      rows.forEach(r=>{
        const d=daysSince(r.lastActivity);
        const fresh = d!==null && d<=7;
        const dot = fresh?'var(--ok)':(d!==null&&d<=30?'var(--stop)':'var(--wait)');
        const work=(r.updates||0)+(r.creates||0);
        html+=`<tr style="border-bottom:1px solid var(--line)">
          <td style="padding:10px 6px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="width:8px;height:8px;border-radius:50%;background:${dot};flex-shrink:0"></span>
              <div><div style="font-weight:700">${r.name||r.username}</div>
              <div style="font-size:11px;color:var(--muted)">${r.jobTitle||''}</div></div>
            </div></td>
          <td style="padding:10px 6px;text-align:center">${r.logins||0}</td>
          <td style="padding:10px 6px;text-align:center">${r.creates||0}</td>
          <td style="padding:10px 6px;text-align:center;font-weight:700;color:${work>0?'var(--oasis-700)':'var(--muted)'}">${work}</td>
          <td style="padding:10px 6px;font-size:12px;color:var(--muted)">${fmtDate(r.lastActivity)}</td>

      });

        الأرقام تقيس الالتزام الفعلي بتحديث المشاريع في النظام الجديد.</p>`;
    }
    body.innerHTML=html;
  }
  fill();
  overlay._refresh=fill;
  modal.querySelector('#x').onclick=()=>{statsModalOpen=false;overlay.remove();};
  overlay.onclick=(e)=>{if(e.target===overlay){statsModalOpen=false;overlay.remove();}};
  root.appendChild(overlay);
}

  if(ov&&ov._refresh) ov._refresh();
}

/* ════════════ نافذة الملف الشخصي ════════════ */
/* محرّر قص وتوسيط الصورة (دائري، باللمس) — يعيد صورة مربعة عبر onDone */
function openImageCropper(dataUrl, onDone){
  const SIZE=260;     // قطر إطار المعاينة
  const OUT=400;      // أبعاد الصورة الناتجة (مربعة)
  const overlay=$(`<div class="overlay" style="z-index:60"></div>`);
  const modal=$(`<div class="modal modal-sm"><div class="modal-head"><h2>قص وتوسيط الصورة</h2>
    <button class="icon-btn" id="x">${I.close}</button></div></div>`);
  const b=document.createElement('div'); b.className='modal-body';
  b.innerHTML=`
    <p style="font-size:12.5px;color:var(--muted);text-align:center;margin-bottom:12px">حرّك الصورة بإصبعك، واستخدم الشريط للتكبير</p>
    <div id="cropFrame" style="position:relative;width:${SIZE}px;height:${SIZE}px;margin:0 auto;border-radius:50%;overflow:hidden;background:#000;touch-action:none;border:3px solid var(--oasis)">
      <canvas id="cropCanvas" width="${SIZE}" height="${SIZE}" style="display:block"></canvas>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin:16px 0 4px">
      <span style="font-size:18px">−</span>
      <input type="range" id="cropZoom" min="1" max="4" step="0.01" value="1" style="flex:1">
      <span style="font-size:18px">+</span>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" id="cropCancel">إلغاء</button>
      <button type="button" class="btn btn-add" id="cropOk">${I.check} اعتماد</button>
    </div>`;
  modal.appendChild(b); overlay.appendChild(modal); root.appendChild(overlay);

  const canvas=b.querySelector('#cropCanvas');
  const ctx=canvas.getContext('2d');
  const img=new Image();
  let scale=1, minScale=1, ox=0, oy=0; // الإزاحة بالبكسل
  let baseW=0, baseH=0;

  function clamp(){
    const w=baseW*scale, h=baseH*scale;
    const maxX=Math.max(0,(w-SIZE)/2), maxY=Math.max(0,(h-SIZE)/2);
    ox=Math.min(maxX,Math.max(-maxX,ox));
    oy=Math.min(maxY,Math.max(-maxY,oy));
  }
  function draw(){
    ctx.clearRect(0,0,SIZE,SIZE);
    const w=baseW*scale, h=baseH*scale;
    ctx.drawImage(img,(SIZE-w)/2+ox,(SIZE-h)/2+oy,w,h);
  }
  img.onload=()=>{
    // يملأ الإطار (يغطّي) مع الحفاظ على النسبة
    const r=Math.max(SIZE/img.width, SIZE/img.height);
    baseW=img.width*r; baseH=img.height*r;
    scale=1; minScale=1; ox=0; oy=0;
    draw();
  };
  img.src=dataUrl;

  // السحب باللمس والماوس
  let dragging=false, lastX=0, lastY=0;
  const frame=b.querySelector('#cropFrame');
  const start=(x,y)=>{dragging=true;lastX=x;lastY=y;};
  const move=(x,y)=>{ if(!dragging)return; ox+=(x-lastX); oy+=(y-lastY); lastX=x;lastY=y; clamp(); draw(); };
  const end=()=>{dragging=false;};
  frame.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  frame.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY);},{passive:true});
  frame.addEventListener('touchend',end);
  frame.addEventListener('mousedown',e=>start(e.clientX,e.clientY));
  window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  window.addEventListener('mouseup',end);

  b.querySelector('#cropZoom').oninput=(e)=>{ scale=minScale*Number(e.target.value); clamp(); draw(); };

  const close=()=>overlay.remove();
  b.querySelector('#cropCancel').onclick=close;
  modal.querySelector('#x').onclick=close;
  b.querySelector('#cropOk').onclick=()=>{
    // أخرِج صورة مربعة بدقة أعلى
    const out=document.createElement('canvas'); out.width=OUT; out.height=OUT;
    const octx=out.getContext('2d');
    const k=OUT/SIZE;
    const w=baseW*scale*k, h=baseH*scale*k;
    octx.drawImage(img,(OUT-w)/2+ox*k,(OUT-h)/2+oy*k,w,h);
    const result=out.toDataURL('image/jpeg',0.85);
    close();
    onDone(result);
  };
}

function openProfile(){
  const u=state.appUser;
  const overlay=$(`<div class="overlay"></div>`);
  const modal=$(`<div class="modal modal-sm"><div class="modal-head"><h2>إعدادات الحساب</h2>
    <button class="icon-btn" id="x">${I.close}</button></div></div>`);
  const form=document.createElement('form');form.className='modal-body';
  form.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:18px">
      <div class="avatar" id="pv" style="width:90px;height:90px;border:2px solid var(--oasis);background:var(--sand-100)">
        ${u.profilePic?`<img src="${u.profilePic}">`:I.user}</div>
      <label style="cursor:pointer;color:var(--oasis-600);font-size:13px;font-weight:600;margin-top:10px;display:flex;align-items:center;gap:5px">
        ${I.img} تغيير الصورة <input type="file" accept="image/*" id="imgUp" class="hidden"></label>
    </div>
    ${u.role!=='admin'?`
    <div style="background:var(--sand-50);border:1px solid var(--line);border-radius:11px;padding:13px;margin-bottom:14px">
      <h4 style="font-size:13px;color:var(--oasis-700);margin-bottom:10px">تغيير الرقم السري</h4>
      <div class="field"><label class="lbl-sm">الرقم السري الجديد</label>
        <input class="inp ltr" type="password" name="newPassword" placeholder="اتركه فارغاً إن لم ترد التغيير"></div>
      <div class="field" style="margin-bottom:0"><label class="lbl-sm">تأكيد الرقم السري</label>
        <input class="inp ltr" type="password" name="newPassword2" placeholder="أعد كتابة الرقم نفسه"></div>
      <div id="pwMsg" style="font-size:12px;margin-top:8px;display:none"></div>
    </div>`:''}
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" id="cancel">إلغاء</button>
      <button type="submit" class="btn btn-add">حفظ</button>
    </div>`;
  let newPic=null;
  form.querySelector('#imgUp').onchange=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=(ev)=>{
      // افتح محرّر القص؛ النتيجة المقصوصة هي ما يُحفظ
      openImageCropper(ev.target.result,(cropped)=>{
        newPic=cropped;
        form.querySelector('#pv').innerHTML=`<img src="${newPic}">`;
      });
    };
    r.readAsDataURL(f);
    e.target.value='';   // يسمح باختيار نفس الصورة مجدداً
  };
  form.onsubmit=async(e)=>{
    e.preventDefault();
    const fd=new FormData(form);
    const np=(fd.get('newPassword')||'').trim();
    const np2=(fd.get('newPassword2')||'').trim();
    const msg=form.querySelector('#pwMsg');
    const showMsg=(t,color)=>{ if(msg){msg.style.display='block';msg.style.color=color;msg.textContent=t;} };

    if(u.role==='admin'){ // المشرف ثابت محلياً (لا يغيّر رمزه من هنا)
      if(newPic){state.appUser.profilePic=newPic;saveSession(state.appUser);}
      overlay.remove();render();return;
    }

    // التحقق من الرقم السري إن أراد المهندس تغييره
    if(np || np2){
      if(np.length<4){ showMsg('الرقم السري يجب أن يكون ٤ خانات على الأقل.','var(--danger)'); return; }
      if(np!==np2){ showMsg('الرقمان غير متطابقين، تأكد من إعادة الكتابة.','var(--danger)'); return; }
    }

    if(CONFIGURED){
      try{
        const qs=await FB.getDocs(FB.query(usersRef(),FB.where("username","==",u.username)));
        if(!qs.empty){
          const ref=FB.doc(db,'artifacts',APP_ID,'public','data','users',qs.docs[0].id);
          const upd={}; if(np)upd.password=np; if(newPic)upd.profilePic=newPic;
          if(Object.keys(upd).length) await FB.updateDoc(ref,upd);
          state.appUser={...state.appUser,...upd};
          saveSession(state.appUser);
        }
      }catch(err){console.error(err); showMsg('تعذّر الحفظ، حاول مرة أخرى.','var(--danger)'); return;}
    }
    overlay.remove();render();
    if(np) setTimeout(()=>alert('تم تغيير الرقم السري بنجاح. استخدمه في الدخول القادم.'),50);
  };
  modal.querySelector('#x').onclick=()=>overlay.remove();
  form.querySelector('#cancel').onclick=()=>overlay.remove();
  modal.appendChild(form);overlay.appendChild(modal);
  overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove();};
  root.appendChild(overlay);
}

/* ---- إقلاع ---- */
const savedUser=loadSession();      // استعادة جلسة هذا الجهاز إن وُجدت
if(savedUser){state.appUser=savedUser;}
render();          // ارسمي الواجهة فوراً
initFirebase();    // ثم حمّلي قاعدة البيانات في الخلفية
</script>
