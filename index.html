<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>مشاريع التصميم المركزي — بلدية مسقط</title>

<!-- الخطوط -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@600;700;800&display=swap" rel="stylesheet">

<!-- مكتبة قراءة Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    /* لوحة الألوان — مستوحاة من الطين العماني وأخضر الواحة */
    --sand-50:#faf7f1;
    --sand-100:#f3ede1;
    --sand-200:#e7dcc6;
    --clay:#b07d4f;
    --clay-dark:#8a5e36;
    --oasis:#1f5d4c;      /* أخضر الواحة الداكن — اللون الأساسي */
    --oasis-700:#184a3c;
    --oasis-600:#256a55;
    --oasis-50:#e8f1ee;
    --ink:#2a2620;
    --muted:#7a7264;
    --line:#e4dccd;
    --ok:#1f7a4d;
    --ok-bg:#e3f3ea;
    --work:#1d6fa5;
    --work-bg:#e4f0f8;
    --wait:#9a8f7c;
    --wait-bg:#f0ebe1;
    --stop:#b8860b;
    --stop-bg:#fbf2dc;
    --cancel:#b3402f;
    --cancel-bg:#f9e6e2;
    --danger:#b3402f;
    --shadow:0 1px 2px rgba(42,38,32,.05), 0 8px 24px -12px rgba(42,38,32,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Tajawal',system-ui,sans-serif;
    background:var(--sand-50);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  h1,h2,h3,h4{font-family:'Cairo','Tajawal',sans-serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--oasis-600);box-shadow:0 0 0 3px rgba(37,106,85,.15)}
  .hidden{display:none !important}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}

  /* ====== شاشة الدخول ====== */
  .auth-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:20px;position:relative;overflow:hidden;
    background:linear-gradient(135deg,var(--oasis) 0%,var(--oasis-700) 100%);
  }
  .auth-pattern{
    position:absolute;inset:0;opacity:.07;
    background-image:radial-gradient(circle at 20% 30%, #fff 0 2px, transparent 2px),
                     radial-gradient(circle at 70% 60%, #fff 0 2px, transparent 2px);
    background-size:48px 48px;
  }
  .auth-card{
    position:relative;z-index:2;width:100%;max-width:420px;
    background:#fff;border-radius:20px;padding:34px 30px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.4);
    border-top:5px solid var(--clay);
  }
  .auth-logo{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:26px}
  .auth-crest{
    width:auto;height:78px;display:flex;align-items:center;justify-content:center;
    margin-bottom:16px;
  }
  .auth-crest img{height:100%;width:auto;object-fit:contain}
  .auth-card h1{font-size:21px;color:var(--ink)}
  .auth-card .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:#4a443a}
  .field input,.field select{
    width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;
    background:var(--sand-50);transition:.15s;
  }
  .ltr{direction:ltr;text-align:left}
  .btn-primary{
    width:100%;background:var(--oasis);color:#fff;font-weight:700;font-size:15px;
    padding:13px;border-radius:11px;transition:.15s;display:flex;justify-content:center;align-items:center;gap:8px;
  }
  .btn-primary:hover{background:var(--oasis-700)}
  .btn-primary:disabled{opacity:.6;cursor:default}
  .switch-link{display:block;width:100%;text-align:center;margin-top:18px;color:var(--oasis-600);font-size:13px;font-weight:600}
  .err{background:var(--cancel-bg);color:var(--cancel);padding:11px 13px;border-radius:10px;font-size:13px;margin-bottom:14px;border:1px solid #f0cfc8}
  .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ====== شريط علوي ====== */
  header.topbar{
    background:var(--oasis);color:#fff;position:sticky;top:0;z-index:30;
    box-shadow:0 2px 12px rgba(24,74,60,.25);
  }
  .topbar-inner{max-width:1200px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px}
  .brand-crest{height:40px;width:auto;display:flex;align-items:center;justify-content:center}
  .brand-crest img{height:100%;width:auto;object-fit:contain}
  .brand h1{font-size:17px;line-height:1.2}
  .brand .crumb{font-size:11px;color:rgba(255,255,255,.7)}
  .search{flex:1;min-width:180px;position:relative}
  .search input{width:100%;padding:9px 38px 9px 14px;border-radius:30px;border:none;background:rgba(255,255,255,.92);color:var(--ink)}
  .search svg{position:absolute;right:12px;top:9px;color:var(--oasis-600)}
  .user-box{display:flex;align-items:center;gap:9px}
  .user-meta{text-align:left;line-height:1.25}
  .user-meta .nm{font-size:13px;font-weight:700}
  .user-meta .rl{font-size:11px;color:rgba(255,255,255,.72)}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--oasis-600);border:2px solid rgba(255,255,255,.4);overflow:hidden;display:flex;align-items:center;justify-content:center}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .icon-btn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;transition:.15s}
  .icon-btn:hover{background:rgba(255,255,255,.16)}

  /* ====== المحتوى ====== */
  main{max-width:1200px;margin:0 auto;padding:26px 18px 60px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .toolbar h2{font-size:20px;color:var(--ink)}
  .toolbar h2 span{color:var(--clay);font-weight:700}
  .tb-actions{display:flex;gap:9px;flex-wrap:wrap}
  .btn{padding:9px 15px;border-radius:10px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;transition:.15s;color:#fff}
  .btn-add{background:var(--oasis)}.btn-add:hover{background:var(--oasis-700)}
  .btn-xl{background:var(--clay)}.btn-xl:hover{background:var(--clay-dark)}
  .btn-del{background:var(--danger)}.btn-del:hover{filter:brightness(.92)}
  .btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  @media(max-width:560px){.btn span.lbl{display:none}}

  /* ====== بطاقات المشاريع ====== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
  .card:hover{transform:translateY(-2px);box-shadow:0 12px 30px -14px rgba(42,38,32,.3)}
  .card-head{padding:15px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--sand-50),#fff)}
  .card-head .row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .tag{font-size:11px;font-weight:700;color:var(--clay-dark);background:var(--sand-100);padding:3px 10px;border-radius:20px}
  .pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid}
  .card-head h3{font-size:16px;line-height:1.3;margin-bottom:5px}
  .entity{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .card-body{padding:15px 16px;flex:1}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;font-size:12px;padding-bottom:13px;margin-bottom:13px;border-bottom:1px dashed var(--line)}
  .meta-grid .k{color:var(--muted)}
  .meta-grid .v{font-weight:700}
  .sec{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:9px;background:var(--sand-50);border:1px solid var(--line);margin-bottom:7px}
  .sec-l{display:flex;align-items:center;gap:8px}
  .sec-l .ttl{font-size:12px;font-weight:700}
  .sec-l .eng{font-size:10px;color:var(--muted)}
  .sec-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:14px}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .card-foot{background:var(--sand-50);padding:9px 14px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .card-foot .upd{font-size:10px;color:var(--muted);line-height:1.35}
  .card-foot .acts{display:flex;gap:6px}
  .act{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s}
  .act-edit{color:var(--oasis-600)}.act-edit:hover{background:var(--oasis-50)}
  .act-del{color:var(--danger)}.act-del:hover{background:var(--cancel-bg)}

  .empty,.loading{text-align:center;padding:70px 20px;background:#fff;border:1px solid var(--line);border-radius:16px;color:var(--muted)}
  .loading .spinner{border-color:var(--line);border-top-color:var(--oasis);width:38px;height:38px;border-width:3px;margin:0 auto}

  /* ====== النوافذ المنبثقة ====== */
  .overlay{position:fixed;inset:0;background:rgba(42,38,32,.55);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;overflow-y:auto}
  .modal{background:#fff;border-radius:18px;width:100%;max-width:860px;max-height:92vh;overflow-y:auto;box-shadow:0 30px 70px -20px rgba(0,0,0,.5)}
  .modal-sm{max-width:380px}
  .modal-head{position:sticky;top:0;background:var(--oasis);color:#fff;padding:15px 22px;display:flex;justify-content:space-between;align-items:center;z-index:5}
  .modal-head h2{font-size:17px}
  .modal-body{padding:22px}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .lbl-sm{display:block;font-size:12px;font-weight:700;margin-bottom:5px;color:#4a443a}
  .inp{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:var(--sand-50)}
  .divider{height:1px;background:var(--line);margin:20px 0}
  .dept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:13px}
  .dept{background:var(--sand-50);border:1px solid var(--line);border-radius:11px;padding:13px}
  .dept h4{font-size:13px;color:var(--oasis-700);border-bottom:1px solid var(--line);padding-bottom:7px;margin-bottom:10px}
  .dept .inp{margin-bottom:8px;font-size:12px}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding-top:18px;margin-top:18px;border-top:1px solid var(--line)}
  .confirm-pop{position:absolute;bottom:38px;left:0;background:#fff;border:1px solid #f0cfc8;border-radius:10px;padding:10px;width:140px;box-shadow:var(--shadow);z-index:10}
  .confirm-pop p{font-size:12px;text-align:center;font-weight:700;color:var(--danger);margin-bottom:8px}
  .confirm-pop .cp-btns{display:flex;gap:6px}
  .confirm-pop button{flex:1;font-size:12px;padding:5px;border-radius:7px;font-weight:700}

  /* لافتة إعداد Firebase */
  .setup-banner{background:var(--stop-bg);border:1px solid #ecd9a8;color:#7a5d12;border-radius:14px;padding:16px 18px;margin-bottom:22px;font-size:13.5px;line-height:1.7}
  .setup-banner b{color:#5e4709}
  .setup-banner code{background:#fff;padding:1px 6px;border-radius:5px;font-size:12px;border:1px solid #e8d6a4}
</style>
</head>

  const r=document.getElementById('root');

    r.innerHTML='<div style="max-width:560px;margin:60px auto;padding:24px;font-family:Tajawal,sans-serif;'+
      'background:#fff;border:1px solid #f0cfc8;border-radius:14px;color:#b3402f;direction:rtl;text-align:right">'+
      '<b style="font-size:16px">تعذّر تشغيل التطبيق</b><p style="margin-top:8px;color:#555;font-size:13px;line-height:1.7">'+
      (e.message||'خطأ غير معروف')+'</p></div>';
  }
});
</script>

const CONFIGURED = !firebaseConfig.apiKey.startsWith("ضعي");
let db=null, auth=null;
// دوال Firebase تُحمَّل ديناميكياً حتى لا يتعطل التطبيق لو فشل تحميل المكتبة
let FB={};
async function loadFirebase(){
  const [appMod,authMod,fsMod]=await Promise.all([
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"),
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
  ]);
  FB={...authMod,...fsMod};
  const app=appMod.initializeApp(firebaseConfig);
  auth=authMod.getAuth(app);
  db=fsMod.getFirestore(app);
}

const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};

};
const ADMIN = { user:'turki69', pass:'abuyassmin69' };
const colRef = ()=> FB.collection(db,'artifacts',APP_ID,'public','data','projects');
const usersRef = ()=> FB.collection(db,'artifacts',APP_ID,'public','data','users');

/* ---- الإقلاع: نرسم الواجهة فوراً ثم نحمّل Firebase ---- */
async function initFirebase(){
  if(!CONFIGURED){state.fbReady=true;state.loading=false;render();return;}
  state.loading=false; render();            // ارسمي شاشة الدخول فوراً
  try{
    await loadFirebase();
    FB.signInAnonymously(auth).catch(e=>console.error("مصادقة:",e));
    FB.onAuthStateChanged(auth,(u)=>{ if(u){state.fbReady=true; subscribeProjects();} });
  }catch(e){
    console.error("تحميل Firebase:",e);
    state.authError='تعذّر الاتصال بقاعدة البيانات. تحقّقي من الإنترنت ومن صحة مفاتيح Firebase.';
    render();
  }
}
function subscribeProjects(){
  FB.onSnapshot(colRef(),(snap)=>{
    const data = snap.docs.map(d=>({id:d.id,...d.data()}));
    data.sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));
    state.projects=data; applyFilter(); state.loading=false; render();
  },(e)=>{console.error("جلب المشاريع:",e);state.loading=false;render();});
}
function applyFilter(){
  const s=state.search.trim().toLowerCase();
  state.filtered = !s ? state.projects : state.projects.filter(p=>
    (p.name||'').toLowerCase().includes(s) ||
    (p.requestingEntity||'').toLowerCase().includes(s) ||
    (p.type||'').toLowerCase().includes(s));
}

/* ════════════ تسجيل الدخول ════════════ */
async function handleAuth(form){
  state.authError='';state.loading=true;render();
  const fd=new FormData(form);
  const username=(fd.get('username')||'').trim().toLowerCase();
  const password=(fd.get('password')||'').trim();

  if(username===ADMIN.user && password.toLowerCase()===ADMIN.pass){
    state.appUser={role:'admin',name:'تركي (المشرف العام)',username,profilePic:''};
    state.loading=false;render();return;
  }
  if(!CONFIGURED){
    state.authError='قاعدة البيانات غير مُعدّة بعد — لا يمكن تسجيل دخول المهندسين حتى تُضاف مفاتيح Firebase.';
    state.loading=false;render();return;
  }
  try{
    if(state.isNewUser){
      const name=(fd.get('name')||'').trim();
      const dept=fd.get('dept'); const jobTitle=fd.get('jobTitle');
      const dup=await FB.getDocs(FB.query(usersRef(),FB.where("username","==",username)));
      if(!dup.empty){state.authError='اسم المستخدم محجوز مسبقاً، اختاري اسماً آخر.';state.loading=false;render();return;}
      const newUser={username,password,name,role:'engineer',dept,jobTitle,profilePic:''};
      await FB.addDoc(usersRef(),newUser);
      state.appUser=newUser;
    }else{
      const qs=await FB.getDocs(FB.query(usersRef(),FB.where("username","==",username),FB.where("password","==",password)));
      if(qs.empty){state.authError='اسم المستخدم أو الرقم السري غير صحيح.';}
      else{state.appUser=qs.docs[0].data();}
    }
  }catch(e){console.error(e);state.authError='تعذّر الاتصال، حاولي مرة أخرى.';}
  state.loading=false;render();
}
function logout(){state.appUser=null;state.isNewUser=false;state.authError='';render();}

/* ════════════ استيراد Excel ════════════ */
function handleExcelImport(file){
  if(!file||!CONFIGURED) return;
  state.loading=true;render();
  const reader=new FileReader();
  reader.onload=async(evt)=>{
    try{
      const wb=window.XLSX.read(evt.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=window.XLSX.utils.sheet_to_json(ws,{header:1});
      let cur=null; const out=[]; const now=new Date().toLocaleString('ar-OM');
      for(const row of rows){
        if(!row||!row.length) continue;
        const c1=String(row[0]||'').trim(), c2=String(row[1]||'').trim(), c3=String(row[2]||'').trim();
        const t=c2||c1; if(!t) continue;
        if(t.includes('دائرة')||t.includes('تتبع المشاريع')||t.includes('اسم المشروع')||t.includes('تاريخ تحديث')) continue;
        if(t.includes('المعماري -')){ if(cur){cur.architectural.engineer=t.replace('المعماري -','').trim(); if(c3&&c3!=='-')cur.requestingEntity=c3;} }
        else if(t.includes('الانشائي -')){ if(cur)cur.structural.engineer=t.replace('الانشائي -','').trim(); }
        else if(t.includes('الخدمات -')){ if(cur)cur.services.engineer=t.replace('الخدمات -','').trim(); }
        else if(t.length>3 && !/^[0-9]+$/.test(t)){
          if(cur&&cur.name) out.push(cur);
          cur={name:t,type:'أخرى',customType:'استيراد من الإكسل',
            requestingEntity:(c3&&c3!=='-')?c3:'غير محدد',overallStatus:'قيد التصميم',
            area:'',cost:'',startDate:'',endDate:'',
            architectural:{engineer:'',status:'قيد الانتظار',notes:''},
            structural:{engineer:'',status:'قيد الانتظار',notes:''},
            services:{engineer:'',status:'قيد الانتظار',notes:''},
            lastUpdatedBy:state.appUser.name,lastUpdatedAt:now,createdAt:new Date().toISOString()};
        }
      }
      if(cur&&cur.name) out.push(cur);
      for(const p of out) await FB.addDoc(colRef(),p);
      state.loading=false;render();
      alert(`تم استيراد ${out.length} مشروع بنجاح.`);
    }catch(e){console.error(e);state.loading=false;render();alert('تعذّرت قراءة ملف الإكسل.');}
  };
  reader.readAsBinaryString(file);
}
async function clearAll(){
  if(!confirm("تحذير: سيتم مسح كل المشاريع نهائياً ولا يمكن التراجع. متابعة؟")) return;
  state.loading=true;render();
  try{
    const snap=await FB.getDocs(FB.query(colRef()));
    const batch=FB.writeBatch(db);
    snap.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    alert("تم مسح جميع المشاريع.");
  }catch(e){console.error(e);alert("حدث خطأ أثناء المسح.");}
  state.loading=false;render();
}
async function saveProject(data,editingId){
  const payload={...data,lastUpdatedBy:state.appUser.name,lastUpdatedAt:new Date().toLocaleString('ar-OM')};
  if(editingId){await FB.updateDoc(FB.doc(db,'artifacts',APP_ID,'public','data','projects',editingId),payload);}
  else{await FB.addDoc(colRef(),{...payload,createdAt:new Date().toISOString()});}
}
async function deleteProject(id){
  await FB.deleteDoc(FB.doc(db,'artifacts',APP_ID,'public','data','projects',id));
}

  trash:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>',
  edit:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
  pin:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>',
  cal:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  close:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg>',
  save:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>',
  build:'<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d9cdb6" stroke-width="1.6"><rect x="4" y="2" width="16" height="20" rx="1"/><path d="M9 22v-4h6v4M8 6h.01M12 6h.01M16 6h.01M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01"/></svg>',
  img:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>'
};

/* ════════════ العرض ════════════ */
function render(){
  root.innerHTML='';
  if(!state.appUser){root.appendChild(renderAuth());}
  else{root.appendChild(renderApp());}
  root.dataset.ok='1';
}

function renderAuth(){
  const isNew=state.isNewUser;
  const wrap=$(`<div class="auth-wrap"><div class="auth-pattern"></div></div>`);
  const card=$(`<div class="auth-card">
    <div class="auth-logo">
      <div class="auth-crest"><img src="${LOGO_DARK}" alt="بلدية مسقط"></div>
      <h1>مشاريع التصميم المركزي</h1>
      <div class="sub">المديرية العامة للشؤون الفنية — بلدية مسقط</div>
    </div>
  </div>`);
  if(state.authError) card.appendChild($(`<div class="err">${state.authError}</div>`));

  const form=document.createElement('form');
  form.innerHTML = (isNew?`
    <div class="field"><label>الاسم الكامل</label><input type="text" name="name" required></div>
    <div class="field"><label>المسمى الوظيفي</label>
      <select name="jobTitle">
        <option>مهندس معماري</option><option>مهندس إنشائي</option><option>مهندس تصميم خدمات</option>
        <option>رئيس القسم المعماري</option><option>رئيس القسم الإنشائي</option><option>رئيس قسم تصميم الخدمات</option>
        <option>مدير الدائرة</option><option>تنسيق ومتابعة</option>
      </select></div>
    <div class="field"><label>القسم الفني المختص</label>
      <select name="dept"><option value="architectural">القسم المعماري</option>
        <option value="structural">القسم الإنشائي</option><option value="services">قسم تصميم الخدمات</option></select></div>
  `:``)+`
    <div class="field"><label>اسم المستخدم</label><input class="ltr" type="text" name="username" required placeholder="username"></div>
    <div class="field"><label>الرقم السري</label><input class="ltr" type="password" name="password" required></div>
    <button class="btn-primary" type="submit" ${state.loading?'disabled':''}>
      ${state.loading?'<div class="spinner"></div>':(isNew?'إنشاء الحساب':'تسجيل الدخول')}
    </button>`;
  form.onsubmit=(e)=>{e.preventDefault();handleAuth(form);};
  card.appendChild(form);

  const sw=$(`<button class="switch-link">${isNew?'لديكِ حساب؟ تسجيل الدخول':'مستخدمة جديدة؟ إنشاء حساب'}</button>`);
  sw.onclick=()=>{state.isNewUser=!state.isNewUser;state.authError='';render();};
  card.appendChild(sw);

  wrap.appendChild(card);
  return wrap;
}

function renderApp(){
  const u=state.appUser; const frag=document.createDocumentFragment();

  /* الشريط العلوي */
  const header=$(`<header class="topbar"><div class="topbar-inner">
    <div class="brand"><div class="brand-crest"><img src="${LOGO_WHITE}" alt="بلدية مسقط"></div>
      <div><h1>التصميم المركزي</h1><div class="crumb">بلدية مسقط · الشؤون الفنية</div></div></div>
    <div class="search">${I.search}<input type="text" placeholder="ابحثي عن مشروع أو جهة طالبة…" value="${state.search}"></div>
    <div class="user-box">
      <div class="user-meta"><div class="nm">${u.name}</div><div class="rl">${u.role==='admin'?'مشرف عام':(u.jobTitle||'مهندس مصمم')}</div></div>
      <div class="avatar">${u.profilePic?`<img src="${u.profilePic}">`:I.user}</div>
      <button class="icon-btn" id="btnProfile" title="إعدادات الحساب">${I.settings}</button>
      <button class="icon-btn" id="btnLogout" title="تسجيل الخروج">${I.logout}</button>
    </div></div></header>`);
  const searchInp=header.querySelector('.search input');
  searchInp.oninput=(e)=>{state.search=e.target.value;applyFilter();updateGrid();};
  header.querySelector('#btnLogout').onclick=logout;
  header.querySelector('#btnProfile').onclick=openProfile;
  frag.appendChild(header);

  /* المحتوى */
  const main=document.createElement('main');

  if(!CONFIGURED){
    main.appendChild($(`<div class="setup-banner">
      <b>⚙ التطبيق يعمل في وضع المعاينة.</b> الدخول كمشرف متاح، لكن حفظ المشاريع وحسابات المهندسين معطّلة
      حتى تُضاف مفاتيح <code>firebaseConfig</code> في أعلى ملف <code>index.html</code>. الدليل في رسالة كلود.
    </div>`));
  }

  const toolbar=$(`<div class="toolbar">
    <h2>قائمة المشاريع <span>(${state.filtered.length})</span></h2>
    <div class="tb-actions">
      ${u.role==='admin'?`
        <button class="btn btn-del" id="btnClear">${I.trash}<span class="lbl">مسح الكل</span></button>
        <button class="btn btn-xl" id="btnXl">${I.upload}<span class="lbl">استيراد Excel</span></button>
        <input type="file" id="xlFile" accept=".xlsx,.xls" class="hidden">`:''}
      <button class="btn btn-add" id="btnAdd">${I.plus}<span class="lbl">إضافة مشروع</span></button>
    </div></div>`);
  if(u.role==='admin'){
    const xl=toolbar.querySelector('#xlFile');
    toolbar.querySelector('#btnXl').onclick=()=>xl.click();
    xl.onchange=(e)=>{handleExcelImport(e.target.files[0]); e.target.value='';};
    toolbar.querySelector('#btnClear').onclick=clearAll;
  }
  toolbar.querySelector('#btnAdd').onclick=()=>openProjectModal(null);
  main.appendChild(toolbar);

  const gridHost=document.createElement('div');
  gridHost.id='gridHost';
  main.appendChild(gridHost);
  frag.appendChild(main);

  setTimeout(updateGrid,0);
  return frag;
}

function updateGrid(){
  const host=document.getElementById('gridHost');
  if(!host) return;
  host.innerHTML='';
  if(state.loading){host.appendChild($(`<div class="loading"><div class="spinner"></div></div>`));return;}
  if(!state.filtered.length){
    host.appendChild($(`<div class="empty">${I.build}<h3 style="margin-top:12px;font-size:18px;color:#5e574a">لا توجد مشاريع لعرضها</h3>
      <p style="margin-top:5px">أضيفي أول مشروع بالضغط على «إضافة مشروع».</p></div>`));
    return;
  }
  const grid=document.createElement('div');grid.className='grid';
  state.filtered.forEach(p=>grid.appendChild(renderCard(p)));
  host.appendChild(grid);
}

function secRow(title,data){
  const st=data?.status||'قيد الانتظار';
  const [c,bg]=SEC_STYLE[st]||SEC_STYLE['قيد الانتظار'];
  return `<div class="sec"><div class="sec-l">
      <span class="dot" style="background:${c}"></span>
      <div><div class="ttl">${title}</div><div class="eng">${data?.engineer||'لم يُسنَد'}</div></div>
    </div><span class="sec-badge" style="color:${c};background:${bg}">${st}</span></div>`;
}

function renderCard(p){
  const [sc,sbg]=STATUS_STYLE[p.overallStatus]||STATUS_STYLE['قيد التصميم'];
  const isAdmin=state.appUser.role==='admin';
  const card=$(`<div class="card">
    <div class="card-head">
      <div class="row1">
        <span class="tag">${p.customType||p.type||'مشروع'}</span>
        <span class="pill" style="color:${sc};background:${sbg};border-color:${sc}33">${p.overallStatus||'قيد التصميم'}</span>
      </div>
      <h3>${p.name||''}</h3>
      <div class="entity">${I.pin} ${p.requestingEntity||'—'}</div>
    </div>
    <div class="card-body">
      <div class="meta-grid">
        <div><span class="k">المساحة:</span> <span class="v">${p.area||'—'}</span></div>
        <div><span class="k">التكلفة:</span> <span class="v">${p.cost||'—'}</span></div>
        <div><span class="k">${I.cal} الاستلام:</span> <span class="v">${p.startDate||'—'}</span></div>
        <div><span class="k">${I.cal} التسليم:</span> <span class="v">${p.endDate||'—'}</span></div>
      </div>
      ${secRow('المعماري',p.architectural)}
      ${secRow('الإنشائي',p.structural)}
      ${secRow('الخدمات',p.services)}
    </div>
    <div class="card-foot">
      <div class="upd">حدّثه: ${p.lastUpdatedBy||'النظام'}<br>${p.lastUpdatedAt||''}</div>
      <div class="acts">
        <button class="act act-edit" title="تحديث">${I.edit}</button>
        ${isAdmin?`<button class="act act-del" title="حذف">${I.trash}</button>`:''}
      </div>
    </div></div>`);
  card.querySelector('.act-edit').onclick=()=>openProjectModal(p);
  if(isAdmin){
    const delBtn=card.querySelector('.act-del');
    delBtn.style.position='relative';
    delBtn.onclick=(e)=>{
      e.stopPropagation();
      if(card.querySelector('.confirm-pop')) return;
      const pop=$(`<div class="confirm-pop"><p>تأكيد الحذف؟</p>
        <div class="cp-btns"><button class="yes" style="background:var(--danger);color:#fff">نعم</button>
        <button class="no" style="background:var(--sand-200);color:#4a443a">لا</button></div></div>`);
      pop.querySelector('.yes').onclick=()=>deleteProject(p.id);
      pop.querySelector('.no').onclick=()=>pop.remove();
      delBtn.appendChild(pop);
    };
  }
  return card;
}

/* ════════════ نافذة المشروع ════════════ */
function openProjectModal(project){
  const data = project ? JSON.parse(JSON.stringify(project)) : {
    name:'',type:'حديقة',customType:'',requestingEntity:'مسقط',area:'',cost:'',
    overallStatus:'قيد التصميم',startDate:'',endDate:'',
    architectural:{engineer:'',status:'قيد الانتظار',notes:''},
    structural:{engineer:'',status:'قيد الانتظار',notes:''},
    services:{engineer:'',status:'قيد الانتظار',notes:''}
  };
  const entities=['مسقط','مطرح','بوشر','السيب','العامرات','قريات',
    'المديرية العامة للشؤون الصحية','المديرية العامة للتخطيط والاستثمار',
    'المديرية العامة للمشاريع والتشجير','جهة أخرى…'];
  const opt=(arr,sel)=>arr.map(o=>`<option ${o===sel?'selected':''}>${o}</option>`).join('');

  const overlay=$(`<div class="overlay"></div>`);
  const modal=$(`<div class="modal"><div class="modal-head"><h2>${project?'تحديث المشروع':'إضافة مشروع جديد'}</h2>
    <button class="icon-btn" id="x">${I.close}</button></div></div>`);
  const form=document.createElement('form');form.className='modal-body';
  form.innerHTML=`
    <div class="form-grid">
      <div><label class="lbl-sm">اسم المشروع</label><input class="inp" name="name" required value="${data.name}"></div>
      <div><label class="lbl-sm">الجهة الطالبة</label><select class="inp" name="requestingEntity">${opt(entities,data.requestingEntity)}</select></div>
      <div><label class="lbl-sm">الوضع العام</label><select class="inp" name="overallStatus" style="font-weight:700">
        ${opt(['قيد التصميم','مكتمل','متوقف الى اشعار اخر','الغي المشروع'],data.overallStatus)}</select></div>
      <div><label class="lbl-sm">النوع</label><select class="inp" name="type">${opt(['حديقة','ممشى','مبنى','أخرى'],data.type)}</select>
        <input class="inp ${data.type==='أخرى'?'':'hidden'}" name="customType" id="ct" placeholder="اكتبي نوع المشروع…" value="${data.customType||''}" style="margin-top:8px"></div>
      <div><label class="lbl-sm">المساحة</label><input class="inp" name="area" value="${data.area||''}"></div>
      <div><label class="lbl-sm">التكلفة (ر.ع)</label><input class="inp" name="cost" value="${data.cost||''}"></div>
      <div><label class="lbl-sm">تاريخ الاستلام</label><input class="inp" type="date" name="startDate" value="${data.startDate||''}"></div>
      <div><label class="lbl-sm">تاريخ التسليم</label><input class="inp" type="date" name="endDate" value="${data.endDate||''}"></div>
    </div>
    <div class="divider"></div>
    <div class="dept-grid">
      ${deptCard('القسم المعماري','architectural',data.architectural)}
      ${deptCard('القسم الإنشائي','structural',data.structural)}
      ${deptCard('قسم الخدمات','services',data.services)}
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" id="cancel">إلغاء</button>
      <button type="submit" class="btn btn-add">${I.save} حفظ التغييرات</button>
    </div>`;
  // إظهار حقل النوع المخصص
  form.querySelector('[name=type]').onchange=(e)=>{
    form.querySelector('#ct').classList.toggle('hidden',e.target.value!=='أخرى');
  };
  form.onsubmit=async(e)=>{
    e.preventDefault();
    const fd=new FormData(form);
    const get=(n)=>fd.get(n)||'';
    const payload={
      name:get('name'),type:get('type'),customType:get('customType'),
      requestingEntity:get('requestingEntity'),overallStatus:get('overallStatus'),
      area:get('area'),cost:get('cost'),startDate:get('startDate'),endDate:get('endDate'),
      architectural:{engineer:get('arch_engineer'),status:get('arch_status'),notes:get('arch_notes')},
      structural:{engineer:get('str_engineer'),status:get('str_status'),notes:get('str_notes')},
      services:{engineer:get('srv_engineer'),status:get('srv_status'),notes:get('srv_notes')}
    };
    if(!CONFIGURED){alert('قاعدة البيانات غير مُعدّة بعد — أضيفي مفاتيح Firebase أولاً لحفظ المشاريع.');return;}
    overlay.remove();
    await saveProject(payload, project?.id);
  };
  modal.querySelector('#x').onclick=()=>overlay.remove();
  form.querySelector('#cancel').onclick=()=>overlay.remove();
  modal.appendChild(form);
  overlay.appendChild(modal);
  overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove();};
  root.appendChild(overlay);
}
function deptCard(title,prefixKey,d){
  const pf={architectural:'arch',structural:'str',services:'srv'}[prefixKey];
  const sOpt=['قيد الانتظار','قيد العمل','مكتمل'].map(o=>`<option ${o===(d.status||'قيد الانتظار')?'selected':''}>${o}</option>`).join('');
  return `<div class="dept"><h4>${title}</h4>
    <input class="inp" name="${pf}_engineer" placeholder="اسم المهندس" value="${d.engineer||''}">
    <select class="inp" name="${pf}_status">${sOpt}</select>
    <textarea class="inp" name="${pf}_notes" rows="2" placeholder="ملاحظات…" style="resize:none">${d.notes||''}</textarea>
  </div>`;
}

/* ════════════ نافذة الملف الشخصي ════════════ */
function openProfile(){
  const u=state.appUser;
  const overlay=$(`<div class="overlay"></div>`);
  const modal=$(`<div class="modal modal-sm"><div class="modal-head"><h2>إعدادات الحساب</h2>
    <button class="icon-btn" id="x">${I.close}</button></div></div>`);
  const form=document.createElement('form');form.className='modal-body';
  form.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:18px">
      <div class="avatar" id="pv" style="width:90px;height:90px;border:2px solid var(--oasis);background:var(--sand-100)">
        ${u.profilePic?`<img src="${u.profilePic}">`:I.user}</div>
      <label style="cursor:pointer;color:var(--oasis-600);font-size:13px;font-weight:600;margin-top:10px;display:flex;align-items:center;gap:5px">
        ${I.img} تغيير الصورة <input type="file" accept="image/*" id="imgUp" class="hidden"></label>
    </div>
    <div class="field"><label class="lbl-sm">الرقم السري الجديد (اختياري)</label>
      <input class="inp ltr" type="password" name="newPassword" placeholder="للتغيير فقط"></div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" id="cancel">إلغاء</button>
      <button type="submit" class="btn btn-add">حفظ</button>
    </div>`;
  let newPic=null;
  form.querySelector('#imgUp').onchange=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=(ev)=>{newPic=ev.target.result;
      form.querySelector('#pv').innerHTML=`<img src="${newPic}">`;};
    r.readAsDataURL(f);
  };
  form.onsubmit=async(e)=>{
    e.preventDefault();
    const np=new FormData(form).get('newPassword');
    if(u.role==='admin'){ // المشرف ثابت محلياً
      if(newPic){state.appUser.profilePic=newPic;}
      overlay.remove();render();return;
    }
    if(CONFIGURED){
      try{
        const qs=await FB.getDocs(FB.query(usersRef(),FB.where("username","==",u.username)));
        if(!qs.empty){
          const ref=FB.doc(db,'artifacts',APP_ID,'public','data','users',qs.docs[0].id);
          const upd={}; if(np)upd.password=np; if(newPic)upd.profilePic=newPic;
          if(Object.keys(upd).length) await FB.updateDoc(ref,upd);
          state.appUser={...state.appUser,...upd};
        }
      }catch(err){console.error(err);}
    }
    overlay.remove();render();
  };
  modal.querySelector('#x').onclick=()=>overlay.remove();
  form.querySelector('#cancel').onclick=()=>overlay.remove();
  modal.appendChild(form);overlay.appendChild(modal);
  overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove();};
  root.appendChild(overlay);
}

/* ---- إقلاع ---- */
render();          // ارسمي الواجهة فوراً
initFirebase();    // ثم حمّلي قاعدة البيانات في الخلفية
</script>
</body>
