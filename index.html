/* يعرض شريط تنبيه بمواعيد التسليم القريبة/المتأخرة (مرة واحدة في الجلسة) */
let deadlineBannerShown=false;
function maybeShowDeadlineBanner(){
  if(deadlineBannerShown) return;
  const u=state.appUser; if(!u) return;
  if(u.role==='admin' || isObserver()) return;        // التنبيه للمهندسين المنفّذين
  const alerts=myDeadlineAlerts(2);                   // خلال يومين أو متأخر
  if(!alerts.length){ deadlineBannerShown=true; return; }
  deadlineBannerShown=true;
  const rows=alerts.map(a=>{
    let badge, color, bg;
    if(a.days<0){ badge=`متأخر ${Math.abs(a.days)} يوم`; color='#b3261e'; bg='#fbe9e7'; }
    else if(a.days===0){ badge='ينتهي اليوم'; color='#a8500a'; bg='#fdecd8'; }
    else { badge=`باقٍ ${a.days} يوم`; color='#a8500a'; bg='#fdecd8'; }
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-top:1px dashed var(--line)">
        <span style="font-size:13.5px"><b>${a.project}</b> <span style="color:var(--muted)">· ${a.dept}</span><br><span style="font-size:11.5px;color:var(--muted)">التسليم المتوقع: ${a.endDate}</span></span>
        <span style="font-size:11.5px;font-weight:700;color:${color};background:${bg};padding:3px 10px;border-radius:20px;white-space:nowrap">${badge}</span>
      </div>`;
  }).join('');
  const overlay=$(`<div class="overlay" id="deadlineOverlay"></div>`);
  const modal=$(`<div class="modal" style="max-width:440px"><div class="modal-head">
      <h2 style="display:flex;align-items:center;gap:8px">${I.bell} تنبيه مواعيد التسليم</h2>
      <button class="icon-btn" id="x">${I.close}</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--muted);margin-bottom:6px">لديك ${alerts.length} ${alerts.length===1?'عمل يقترب':'أعمال تقترب'} موعد تسليمها أو تجاوزته. يُرجى المتابعة:</p>
      ${rows}
      <div class="modal-foot"><button class="btn btn-add" id="ok">حسناً، فهمت</button></div>
    </div></div>`);
  overlay.appendChild(modal);
  const close=()=>overlay.remove();
  modal.querySelector('#x').onclick=close;
  modal.querySelector('#ok').onclick=close;
  overlay.onclick=(e)=>{ if(e.target===overlay) close(); };
  root.appendChild(overlay);
}

let completedOpen=false;   // (محتفظ به للتوافق) غير مستخدم بعد الفصل
let doneView=false;        // true = عرض شاشة المشاريع المنتهية المنفصلة
let myProjectsView=false;  // true = عرض مشاريع المهندس الحالي فقط
let opinionView=false;     // true = عرض شاشة الآراء الفنية فقط (مشاريع حالتها «رأي فني»)
function updateGrid(){
  const host=document.getElementById('gridHost');
  if(!host) return;
  host.innerHTML='';
  if(state.loading){host.appendChild($(`<div class="loading"><div class="spinner"></div></div>`));return;}

  // فصل المشاريع المنتهية والآراء الفنية عن المشاريع النشطة
  // منتهٍ = «مكتمل» أو اكتملت كل أقسامه المُسنَدة تلقائياً
  const done=state.filtered.filter(p=>p.overallStatus!=='رأي فني' && isEffectivelyDone(p));
  const active=state.filtered.filter(p=>p.overallStatus!=='رأي فني' && !isEffectivelyDone(p));

  /* ── شاشة «مشاريعي» للمهندس ── */
  if(myProjectsView){
    const mine=state.filtered.filter(projectHasMe);
    const header=document.createElement('div');
    header.className='done-screen-head';
    header.innerHTML=`
      <button class="btn btn-ghost" id="backAll">${I.chevronR||I.chevron} رجوع لكل المشاريع</button>
      <h2 style="display:flex;align-items:center;gap:9px;margin:0;font-size:19px;color:var(--oasis-700)">
        ${I.build} مشاريعي <span class="done-count">${mine.length}</span></h2>`;
    host.appendChild(header);
    if(mine.length){
      const grid=document.createElement('div');grid.className='grid';
      mine.forEach(p=>grid.appendChild(renderCard(p)));
      host.appendChild(grid);
    }else{
      host.appendChild($(`<div class="empty" style="padding:40px 20px">${I.build}
        <p style="margin-top:10px;color:var(--muted)">لا توجد مشاريع مُسنَدة إليك حالياً.</p></div>`));
    }
    const back=host.querySelector('#backAll');
    if(back) back.onclick=()=>{ myProjectsView=false; updateGrid(); };
    return;
  }

  /* ── شاشة «الآراء الفنية» — مشاريع حالتها «رأي فني» فقط ── */
  if(opinionView){
    const opinions=state.filtered.filter(p=>p.overallStatus==='رأي فني');
    const header=document.createElement('div');
    header.className='done-screen-head';
    header.innerHTML=`
      <button class="btn btn-ghost" id="backAllOpn">${I.chevronR||I.chevron} رجوع لكل المشاريع</button>
      <h2 style="display:flex;align-items:center;gap:9px;margin:0;font-size:19px;color:#8a6d2f">
        ${I.report} الآراء الفنية <span class="done-count" style="background:#f3e9d7;color:#8a6d2f">${opinions.length}</span></h2>`;
    host.appendChild(header);
    if(opinions.length){
      const grid=document.createElement('div');grid.className='grid';
      opinions.forEach(p=>grid.appendChild(renderCard(p)));
      host.appendChild(grid);
    }else{
      host.appendChild($(`<div class="empty" style="padding:40px 20px">${I.report}
        <p style="margin-top:10px;color:var(--muted)">لا توجد مشاريع بحالة «رأي فني» حالياً.</p></div>`));
    }
    const back=host.querySelector('#backAllOpn');
    if(back) back.onclick=()=>{ opinionView=false; updateGrid(); };
    return;
  }

  if(!state.filtered.length){
    doneView=false;
    host.appendChild($(`<div class="empty">${I.build}<h3 style="margin-top:12px;font-size:18px;color:#5e574a">لا توجد مشاريع لعرضها</h3>
      <p style="margin-top:5px">أضِف أول مشروع بالضغط على «إضافة مشروع».</p></div>`));
    return;
  }

  /* ── شاشة المشاريع المنتهية المنفصلة ── */
  if(doneView){
    const header=document.createElement('div');
    header.className='done-screen-head';
    header.innerHTML=`
      <button class="btn btn-ghost" id="backActive">${I.chevronR||I.chevron} رجوع للمشاريع القائمة</button>
      <h2 style="display:flex;align-items:center;gap:9px;margin:0;font-size:19px;color:var(--oasis-700)">
        ${I.check} المشاريع المنتهية <span class="done-count">${done.length}</span></h2>`;
    host.appendChild(header);
    if(done.length){
      const grid=document.createElement('div');grid.className='grid done-body open';
      done.forEach(p=>grid.appendChild(renderCard(p)));
      host.appendChild(grid);
    }else{
      host.appendChild($(`<div class="empty" style="padding:40px 20px">${I.check}
        <p style="margin-top:10px;color:var(--muted)">لا توجد مشاريع منتهية.</p></div>`));
    }
    const back=host.querySelector('#backActive');
    if(back) back.onclick=()=>{ doneView=false; updateGrid(); };
    return;
  }

  /* ── الشاشة الرئيسية: زر دخول لشاشة المنتهية + المشاريع النشطة ── */
  if(done.length){
    const entry=document.createElement('button');
    entry.className='done-toggle done-entry';
    entry.innerHTML=`
      <span style="display:flex;align-items:center;gap:9px">
        ${I.check} المشاريع المنتهية
        <span class="done-count">${done.length}</span>
      </span>
      <span style="display:flex;align-items:center;gap:6px;color:var(--oasis-600);font-size:13px">عرضها ${I.chevronL||I.chevron}</span>`;
    entry.onclick=()=>{ doneView=true; updateGrid(); };
    host.appendChild(entry);
  }

  // المشاريع النشطة
  if(active.length){
    const grid=document.createElement('div');grid.className='grid';
    active.forEach(p=>grid.appendChild(renderCard(p)));
    host.appendChild(grid);
  }else{
    host.appendChild($(`<div class="empty" style="padding:40px 20px">${I.build}
      <p style="margin-top:10px;color:var(--muted)">لا توجد مشاريع نشطة حالياً.</p></div>`));
  }
}

function secRow(title,data){
  const st=data?.status||'قيد الانتظار';
  const [c,bg]=SEC_STYLE[st]||SEC_STYLE['قيد الانتظار'];
  const sd=data?.startDate, ed=data?.endDate, ad=data?.actualDate;
  const dateLine = (sd||ed) ? `<div class="sec-dates">استلام: ${sd||'—'} · تسليم متوقع: ${ed||'—'}</div>` : '';
  const actualLine = ad ? `<div class="sec-dates" style="display:flex;justify-content:space-between;align-items:center;gap:6px"><span>تسليم فعلي: ${ad}</span>${deliveryBadge(ed,ad)}</div>` : '';
  const avg=ratingAvg(data?.eval);
  const rateLine = (avg && canViewEval()) ? `<div class="sec-rate">تقييم رئيس القسم: <b>${avg}</b> <span style="color:var(--stop)">★</span></div>` : '';
  const wl=(data?.workLink||'').trim();
  const isWeb=/^https?:\/\//i.test(wl);
  const linkLine = wl ? (isWeb
      ? `<a href="${wl.replace(/"/g,'&quot;')}" target="_blank" rel="noopener" class="work-link" style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--oasis-700);margin-top:5px;text-decoration:none;word-break:break-all">${I.link||'🔗'} فتح مسار العمل</a>`
      : `<a href="#" class="work-link" data-copy="${wl.replace(/"/g,'&quot;')}" style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--oasis-700);margin-top:5px;text-decoration:none;word-break:break-all" title="${wl.replace(/"/g,'&quot;')}">${I.link||'🔗'} نسخ مسار العمل</a>`) : '';
  return `<div class="sec sec-col"><div class="sec-row">
      <div class="sec-l">
        <span class="dot" style="background:${c}"></span>
        <div><div class="ttl">${title}</div><div class="eng">${data?.engineer||'لم يُسنَد'}</div></div>
      </div><span class="sec-badge" style="color:${c};background:${bg}">${st}</span>
    </div>${dateLine}${actualLine}${rateLine}${linkLine}</div>`;
}

function renderCard(p){
  const [sc,sbg]=STATUS_STYLE[p.overallStatus]||STATUS_STYLE['قيد التصميم'];
  const isAdmin=state.appUser.role==='admin';
  const card=$(`<div class="card">
    <div class="card-head">
      <div class="row1">
        <span class="tag">${p.customType||p.type||'مشروع'}</span>
        <span class="pill" style="color:${sc};background:${sbg};border-color:${sc}33">${p.overallStatus||'قيد التصميم'}</span>
      </div>
      <h3>${p.name||''}</h3>
      ${p.projectNo?`<div style="font-size:11.5px;color:var(--muted);margin-top:2px">رقم المشروع: <b style="color:var(--oasis-700)">${p.projectNo}</b></div>`:''}
      <div class="entity">${I.pin} ${p.requestingEntity||'—'}</div>
    </div>
    <div class="card-body">
      <div class="meta-grid">
        <div><span class="k">المساحة:</span> <span class="v">${p.area||'—'}</span></div>
        <div><span class="k">التكلفة:</span> <span class="v">${p.cost||'—'}</span></div>
        <div><span class="k">${I.cal} الاستلام:</span> <span class="v">${p.startDate||'—'}</span></div>
        <div><span class="k">${I.cal} التسليم:</span> <span class="v">${p.endDate||'—'}</span></div>
      </div>
      ${secRow('المعماري',p.architectural)}
      ${(p.overallStatus==='فكرة مبدئية' && Array.isArray(p.ideaStages) && p.ideaStages.length)?`<div style="font-size:12px;color:var(--oasis-700);background:var(--oasis-50);border-radius:8px;padding:6px 10px;margin-top:6px">مراحل الفكرة: <b>${p.ideaStages.length}</b> · آخر مرحلة: ${p.ideaStages[p.ideaStages.length-1].date||''}</div>`:''}
      ${(p.overallStatus==='رأي فني' && Array.isArray(p.opinionStages) && p.opinionStages.length)?`<div style="font-size:12px;color:#8a6d2f;background:#f3e9d7;border-radius:8px;padding:6px 10px;margin-top:6px">مراحل الرأي الفني: <b>${p.opinionStages.length}</b> · آخر مرحلة: ${p.opinionStages[p.opinionStages.length-1].date||''}</div>`:''}
      ${p.overallStatus==='فكرة مبدئية' ? '' : secRow('الإنشائي',p.structural)}
      ${p.overallStatus==='فكرة مبدئية' ? '' : secRow('الخدمات',p.services)}
    </div>
    <div class="card-foot">
      <div class="upd">حدّثه: ${p.lastUpdatedBy||'النظام'}<br>${p.lastUpdatedAt||''}</div>
      <div class="acts">
        <button class="act act-edit" title="${isObserver()?'عرض':'تحديث'}">${isObserver()?I.person:I.edit}</button>
        ${canDeleteProject(p)?`<button class="act act-del" title="حذف">${I.trash}</button>`:''}
      </div>
    </div></div>`);
  card.querySelector('.act-edit').onclick=()=>openProjectModal(p);
  // روابط الشبكة المحلية: نسخ المسار للحافظة (المتصفح يمنع فتحها مباشرة)
  card.querySelectorAll('.work-link[data-copy]').forEach(a=>{
    a.onclick=(e)=>{
      e.preventDefault();
      const path=a.getAttribute('data-copy');
      const done=()=>{ const o=a.textContent; a.textContent='✓ تم نسخ المسار — الصقه في مستكشف الملفات'; setTimeout(()=>{a.innerHTML=`${I.link} نسخ مسار العمل`;},2200); };
      if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(path).then(done).catch(()=>{prompt('انسخ المسار:',path);}); }
      else { prompt('انسخ المسار:',path); }
    };
  });
  if(canDeleteProject(p)){
    const delBtn=card.querySelector('.act-del');
    delBtn.style.position='relative';
    delBtn.onclick=(e)=>{
      e.stopPropagation();
      if(card.querySelector('.confirm-pop')) return;
      const pop=$(`<div class="confirm-pop"><p>تأكيد الحذف؟</p>
        <div class="cp-btns"><button class="yes" style="background:var(--danger);color:#fff">نعم</button>
        <button class="no" style="background:var(--sand-200);color:#4a443a">لا</button></div></div>`);
      pop.querySelector('.yes').onclick=(ev)=>{ ev.stopPropagation(); deleteProject(p.id); };
      pop.querySelector('.no').onclick=(ev)=>{ ev.stopPropagation(); pop.remove(); };
      // امنع أي نقر داخل الفقاعة من الوصول لزر الحذف (كان يمنع استجابة «لا»)
      pop.onclick=(ev)=>ev.stopPropagation();
      delBtn.appendChild(pop);
    };
  }
  return card;
}

/* ════════════ نافذة المشروع ════════════ */
function openProjectModal(project){
  const data = project ? JSON.parse(JSON.stringify(project)) : {
    name:'',type:'حديقة',customType:'',requestingEntity:'مسقط',area:'',cost:'',
    overallStatus:'قيد التصميم',startDate:'',endDate:'',
    architectural:{engineer:'',status:'قيد الانتظار',notes:''},
    structural:{engineer:'',status:'قيد الانتظار',notes:''},
    services:{engineer:'',status:'قيد الانتظار',notes:''}
  };
  const opt=(arr,sel)=>arr.map(o=>`<option ${o===sel?'selected':''}>${o}</option>`).join('');

  const overlay=$(`<div class="overlay" id="projectFormOverlay"></div>`);
  const modal=$(`<div class="modal"><div class="modal-head"><h2>${project?'تحديث المشروع':'إضافة مشروع جديد'}</h2>
    <button class="icon-btn" id="x">${I.close}</button></div></div>`);
  const form=document.createElement('form');form.className='modal-body';
  const GDIS = isObserver() ? 'disabled' : '';
  form.innerHTML=`
    <div class="form-grid">
      <div><label class="lbl-sm">اسم المشروع</label><input class="inp" name="name" required value="${data.name}" ${GDIS}></div>
      <div><label class="lbl-sm">رقم المشروع (اختياري)</label><input class="inp" name="projectNo" value="${data.projectNo||''}" placeholder="مثال: 2026-104" ${GDIS}></div>
      <div><label class="lbl-sm">الجهة الطالبة</label><select class="inp" name="requestingEntity" ${GDIS}>${opt(opts('entity'),data.requestingEntity)}</select></div>
      <div><label class="lbl-sm">الوضع العام</label><select class="inp" name="overallStatus" style="font-weight:700" ${GDIS}>
        ${opt(['قيد التصميم','فكرة مبدئية','خرائط تفصيلية','رأي فني','مكتمل','متوقف الى اشعار اخر','الغي المشروع'],data.overallStatus)}</select></div>
      <div><label class="lbl-sm">النوع</label><select class="inp" name="type" ${GDIS}>${opt(opts('type'),data.type)}</select>
        <input class="inp ${data.type==='أخرى'?'':'hidden'}" name="customType" id="ct" placeholder="اكتب نوع المشروع…" value="${data.customType||''}" style="margin-top:8px" ${GDIS}></div>
      <div><label class="lbl-sm">المساحة</label><input class="inp" name="area" value="${data.area||''}" ${GDIS}></div>
      <div><label class="lbl-sm">التكلفة (ر.ع)</label><input class="inp" name="cost" value="${data.cost||''}" ${GDIS}></div>
      <div><label class="lbl-sm">تاريخ الاستلام</label><input class="inp" type="date" name="startDate" value="${data.startDate||''}" ${GDIS}></div>
      <div><label class="lbl-sm">تاريخ التسليم</label><input class="inp" type="date" name="endDate" value="${data.endDate||''}" ${GDIS}></div>
    </div>
    <div class="divider"></div>
    <div class="dept-grid">
      ${deptCard('القسم المعماري','architectural',data.architectural)}
      <div id="otherDepts" style="display:contents">
        ${deptCard('القسم الإنشائي','structural',data.structural)}
        ${deptCard('قسم الخدمات','services',data.services)}
      </div>
    </div>
    <div id="ideaStagesBox"></div>
    <div id="opinionStagesBox"></div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" id="cancel">${isObserver()?'إغلاق':'إلغاء'}</button>
      ${isObserver()?'':`<button type="submit" class="btn btn-add">${I.save} حفظ التغييرات</button>`}
    </div>`;
  // إظهار حقل النوع المخصص
  form.querySelector('[name=type]').onchange=(e)=>{
    form.querySelector('#ct').classList.toggle('hidden',e.target.value!=='أخرى');
  };
  // ── مراحل الفكرة (تظهر فقط عند «فكرة مبدئية») ──
  let ideaStages = Array.isArray(data.ideaStages) ? data.ideaStages.map(s=>({...s})) : [];
  const stagesBox=form.querySelector('#ideaStagesBox');
  const canEditIdea = !isObserver();
  const expectedDelivery = (data.architectural?.endDate) || data.endDate || '';
  function renderStages(){
    if(overallSel.value!=='فكرة مبدئية'){ stagesBox.innerHTML=''; return; }
    const nextNum=ideaStages.length+1;
    const isFirst = nextNum===1;
    const todayStr=new Date().toISOString().slice(0,10);
    stagesBox.innerHTML=`
      <div class="divider"></div>
      <div style="background:var(--sand-50);border:1px solid var(--line);border-radius:14px;padding:16px">
        <h4 style="margin:0 0 10px;color:var(--oasis-700);font-size:15px">مراحل الفكرة</h4>
        ${ideaStages.length? ideaStages.map((s,i)=>`
          <div style="background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
              <span style="font-weight:700;color:var(--oasis-700)">المرحلة ${s.stage||(i+1)}</span>
              <span style="display:flex;align-items:center;gap:8px"><span style="font-size:11.5px;color:var(--muted)">${(i===0)?'تاريخ التسليم المتوقع: ':''}${s.date?dmy(s.date):'—'}</span>
              ${canEditIdea?`<button type="button" class="act act-del" data-rmstage="${i}" title="حذف">${I.trash}</button>`:''}</span>
            </div>
            ${s.notes?`<div style="font-size:13px;color:var(--ink);margin-top:6px;line-height:1.7">${s.notes}</div>`:''}
            ${s.by?`<div style="font-size:10.5px;color:var(--muted);margin-top:4px">سجّلها: ${s.by}</div>`:''}
          </div>`).join('') : '<div style="font-size:12.5px;color:var(--muted);padding:4px 0 10px">لا توجد مراحل بعد. أضِف المرحلة الأولى للفكرة.</div>'}
        ${canEditIdea?`
          <div style="border-top:1px dashed var(--line);padding-top:12px;margin-top:6px">
            <label class="lbl-sm">إضافة المرحلة ${nextNum}</label>
            <textarea class="inp" id="newStageNotes" rows="3" placeholder="ملاحظات المرحلة ${nextNum} (ما الذي عُدّل أو أُضيف في هذه المرحلة)…" style="resize:vertical"></textarea>
            ${isFirst
              ? `<div style="font-size:11.5px;color:var(--muted);margin-top:6px">تاريخ المرحلة الأولى = تاريخ التسليم المتوقع: <b>${(expectedDelivery?dmy(expectedDelivery):null)||'غير محدّد'}</b></div>`
              : `<label class="lbl-sm" style="margin-top:6px">تاريخ تقديم هذه المرحلة</label>
                 <input class="inp" type="date" id="newStageDate" value="${todayStr}">`}
            <button type="button" class="btn btn-ghost" id="addStageBtn" style="margin-top:8px">${I.plus} إضافة المرحلة ${nextNum}</button>
          </div>`:''}
      </div>`;
    // ربط الأزرار
    const addBtn=stagesBox.querySelector('#addStageBtn');
    if(addBtn) addBtn.onclick=()=>{
      const notes=(stagesBox.querySelector('#newStageNotes').value||'').trim();
      if(!notes){ alert('اكتب ملاحظات المرحلة.'); return; }
      const first = ideaStages.length===0;
      const dateInp=stagesBox.querySelector('#newStageDate');
      const date = first ? (expectedDelivery || new Date().toISOString().slice(0,10))
                         : (dateInp && dateInp.value ? dateInp.value : new Date().toISOString().slice(0,10));
      ideaStages.push({stage:ideaStages.length+1, notes, date, by:state.appUser?.name||'—'});
      renderStages();
    };
    stagesBox.querySelectorAll('[data-rmstage]').forEach(b=>{
      b.onclick=()=>{ const i=Number(b.getAttribute('data-rmstage')); ideaStages.splice(i,1);
        ideaStages.forEach((s,idx)=>s.stage=idx+1); renderStages(); };
    });
  }
  // ── مراحل الرأي الفني (تظهر فقط عند «رأي فني») ──
  let opinionStages = Array.isArray(data.opinionStages) ? data.opinionStages.map(s=>({...s})) : [];
  const opnBox=form.querySelector('#opinionStagesBox');
  function renderOpinionStages(){
    if(overallSel.value!=='رأي فني'){ opnBox.innerHTML=''; return; }
    const nextNum=opinionStages.length+1;
    const isFirst = nextNum===1;
    const todayStr=new Date().toISOString().slice(0,10);
    const expectedDeliveryO = (data.architectural?.endDate) || data.endDate || '';
    opnBox.innerHTML=`
      <div class="divider"></div>
      <div style="background:var(--sand-50);border:1px solid var(--line);border-radius:14px;padding:16px">
        <h4 style="margin:0 0 10px;color:var(--oasis-700);font-size:15px">مراحل الرأي الفني</h4>
        ${opinionStages.length? opinionStages.map((s,i)=>`
          <div style="background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
              <span style="font-weight:700;color:var(--oasis-700)">المرحلة ${s.stage||(i+1)}</span>
              <span style="display:flex;align-items:center;gap:8px"><span style="font-size:11.5px;color:var(--muted)">${(i===0)?'تاريخ التسليم المتوقع: ':''}${s.date?dmy(s.date):'—'}</span>
              ${canEditIdea?`<button type="button" class="act act-del" data-rmopn="${i}" title="حذف">${I.trash}</button>`:''}</span>
            </div>
            ${s.notes?`<div style="font-size:13px;color:var(--ink);margin-top:6px;line-height:1.7">${s.notes}</div>`:''}
            ${s.by?`<div style="font-size:10.5px;color:var(--muted);margin-top:4px">سجّلها: ${s.by}</div>`:''}
          </div>`).join('') : '<div style="font-size:12.5px;color:var(--muted);padding:4px 0 10px">لا توجد مراحل بعد. أضِف المرحلة الأولى للرأي الفني.</div>'}
        ${canEditIdea?`
          <div style="border-top:1px dashed var(--line);padding-top:12px;margin-top:6px">
            <label class="lbl-sm">إضافة المرحلة ${nextNum}</label>
            <textarea class="inp" id="newOpnNotes" rows="3" placeholder="ملاحظات المرحلة ${nextNum} (تفاصيل الرأي الفني في هذه المرحلة)…" style="resize:vertical"></textarea>
            ${isFirst
              ? `<div style="font-size:11.5px;color:var(--muted);margin-top:6px">تاريخ المرحلة الأولى = تاريخ التسليم المتوقع: <b>${(expectedDeliveryO?dmy(expectedDeliveryO):null)||'غير محدّد'}</b></div>`
              : `<label class="lbl-sm" style="margin-top:6px">تاريخ تقديم هذه المرحلة</label>
                 <input class="inp" type="date" id="newOpnDate" value="${todayStr}">`}
            <button type="button" class="btn btn-ghost" id="addOpnBtn" style="margin-top:8px">${I.plus} إضافة المرحلة ${nextNum}</button>
          </div>`:''}
      </div>`;
    const addBtn=opnBox.querySelector('#addOpnBtn');
    if(addBtn) addBtn.onclick=()=>{
      const notes=(opnBox.querySelector('#newOpnNotes').value||'').trim();
      if(!notes){ alert('اكتب ملاحظات المرحلة.'); return; }
      const first = opinionStages.length===0;
      const dateInp=opnBox.querySelector('#newOpnDate');
      const date = first ? (expectedDeliveryO || new Date().toISOString().slice(0,10))
                         : (dateInp && dateInp.value ? dateInp.value : new Date().toISOString().slice(0,10));
      opinionStages.push({stage:opinionStages.length+1, notes, date, by:state.appUser?.name||'—', byUsername:state.appUser?.username||''});
      renderOpinionStages();
    };
    opnBox.querySelectorAll('[data-rmopn]').forEach(b=>{
      b.onclick=()=>{ const i=Number(b.getAttribute('data-rmopn')); opinionStages.splice(i,1);
        opinionStages.forEach((s,idx)=>s.stage=idx+1); renderOpinionStages(); };
    });
  }
  // عند «فكرة مبدئية» يبقى القسم المعماري فقط (عمل مقتصر عليه)
  const overallSel=form.querySelector('[name=overallStatus]');
  const otherDepts=form.querySelector('#otherDepts');
  const applyIdeaMode=()=>{
    if(otherDepts) otherDepts.style.display = (overallSel.value==='فكرة مبدئية') ? 'none' : 'contents';
    // في حالة «رأي فني»: يُخفى معيار «جودة التصميم» من تقييم رئيس القسم (الرأي ليس تصميماً كاملاً)
    const isOpinion = (overallSel.value==='رأي فني');
    form.setAttribute('data-opinion', isOpinion ? '1' : '0');
    form.querySelectorAll('.rate-quality').forEach(el=>{ el.style.display = isOpinion ? 'none' : ''; });
    renderStages();
    renderOpinionStages();
  };
  if(overallSel){ overallSel.onchange=applyIdeaMode; applyIdeaMode(); }

  // ── حفظ مسودّة تلقائياً (تنجو من تحديث/إغلاق الصفحة بالخطأ) ──
  const DRAFT_KEY = 'cd_draft_'+(project?.id || 'new');
  const saveDraft=()=>{
    try{
      const fd=new FormData(form); const obj={};
      for(const [k,v] of fd.entries()) obj[k]=v;
      obj.__at = Date.now();
      localStorage.setItem(DRAFT_KEY, JSON.stringify(obj));
    }catch(e){}
  };
  const clearDraft=()=>{ try{ localStorage.removeItem(DRAFT_KEY); }catch(e){} };
  // استعادة مسودّة سابقة إن وُجدت (للنماذج الجديدة أساساً)
  try{
    const raw=localStorage.getItem(DRAFT_KEY);
    if(raw){
      const d=JSON.parse(raw);
      const ageMin=(Date.now()-(d.__at||0))/60000;
      if(ageMin < 720){   // خلال 12 ساعة
        if(confirm('توجد مسودّة غير محفوظة لهذا النموذج. هل تريد استعادتها؟')){
          Object.keys(d).forEach(k=>{
            if(k==='__at') return;
            const els=form.querySelectorAll(`[name="${k}"]`);
            els.forEach(el=>{
              if(el.type==='checkbox'||el.type==='radio'){
                // FormData يخزّن القيم المحدّدة فقط؛ فعّل ما يطابق
                if(el.value===d[k]) el.checked=true;
              }else{
                el.value=d[k];
              }
            });
          });
          if(overallSel) applyIdeaMode();
        }else{ clearDraft(); }
      }else{ clearDraft(); }
    }
  }catch(e){}
  // احفظ المسودّة عند أي كتابة/تغيير (مع تهدئة بسيطة)
  let draftTimer=null;
  form.addEventListener('input', ()=>{ clearTimeout(draftTimer); draftTimer=setTimeout(saveDraft, 400); });
  form.addEventListener('change', saveDraft);

  form.onsubmit=async(e)=>{
    e.preventDefault();
    const fd=new FormData(form);
    const get=(n)=>fd.get(n)||'';
    // يبني تقييم القسم: من النموذج إن كان المستخدم مخوّلاً، وإلا يبقي القديم
    const buildEval=(pf,key)=>{
      if(canEvaluate(key)){
        // في «رأي فني» لا يُحتسب معيار جودة التصميم (يُترك فارغاً)
        const isOpinion = (get('overallStatus')==='رأي فني');
        return {
          quality: isOpinion ? '' : get(pf+'_ev_quality'), requirements:get(pf+'_ev_requirements'),
          communication:get(pf+'_ev_communication'), challenges:get(pf+'_ev_challenges'),
          delay:get(pf+'_ev_delay'),
          notes:get(pf+'_ev_notes'),
          by:state.appUser.name, at:new Date().toLocaleString('ar-OM')
        };
      }
      return (data[key] && data[key].eval) ? data[key].eval : {};
    };
    // التواريخ: المهندس العادي لا يستطيع تغيير تاريخ له قيمة محفوظة (يُبقى الأصل)
    const dateVal=(pf,key,field)=>{
      const orig=(data[key]&&data[key][field])?data[key][field]:'';
      if(canEvaluate(key)) return get(pf+'_'+field);   // المشرف/رئيس القسم يعدّل بحرية
      return orig ? orig : get(pf+'_'+field);            // غير المخوّل: أول إدخال فقط
    };
    // يجمع المهندسين المختارين (checkboxes) لكل قسم → مصفوفة {username,name}
    const engVal=(pf)=>{
      const box=form.querySelector(`[name="${pf}_engBox"]`);
      const engineers=[];
      if(box){
        box.querySelectorAll('input[type="checkbox"]:checked').forEach(cb=>{
          const u=state.users.find(x=>x.username===cb.value);
          if(u) engineers.push({username:u.username,name:u.name});
        });
      }
      // اسم العرض المجمّع + توافق رجعي مع الحقول القديمة
      const names=engineers.map(e=>e.name).join('، ');
      const firstUser=engineers.length?engineers[0].username:'';
      return {engineers, engineer:names, engineerUsername:firstUser};
    };
    // تاريخ التسليم الفعلي: المشرف/رئيس القسم يعدّله يدوياً؛ غيرهما يُبقي الأصل
    const actualVal=(pf,key)=>{
      const orig=(data[key]&&data[key].actualDate)?data[key].actualDate:'';
      if(canEvaluate(key)){
        const f=form.querySelector(`[name="${pf}_actualDate"]`);
        if(f) return f.value||'';   // الحقل ظاهر للمخوّل فقط
      }
      return orig;
    };
    const archEng=engVal('arch'), strEng=engVal('str'), srvEng=engVal('srv');
    // يبني بيانات القسم من النموذج إن كان المستخدم مخوّلاً بتعديله؛ وإلا يُبقي الأصل كما هو
    const sectionData=(pf,key,engObj)=>{
      if(!canEditDept(key)){
        return (data[key]) ? {...data[key]} : {};   // قسم غير مخوّل ⇒ لا تغيير إطلاقاً
      }
      return {...engObj,
        status:get(pf+'_status'), notes:get(pf+'_notes'), workLink:(get(pf+'_workLink')||'').trim(),
        startDate:dateVal(pf,key,'startDate'), endDate:dateVal(pf,key,'endDate'),
        actualDate:actualVal(pf,key), eval:buildEval(pf,key)};
    };
    const payload={
      name:get('name'),projectNo:get('projectNo'),type:get('type'),customType:get('customType'),
      ideaStages:ideaStages,
      opinionStages:opinionStages,
      requestingEntity:get('requestingEntity'),overallStatus:get('overallStatus'),
      area:get('area'),cost:get('cost'),startDate:get('startDate'),endDate:get('endDate'),
      architectural:sectionData('arch','architectural',archEng),
      structural:sectionData('str','structural',strEng),
      services:sectionData('srv','services',srvEng)
    };
    // تحقق: أي تاريخ استلام يستوجب تاريخ تسليم متوقع (يُطبَّق على المهندسين فقط)
    // المعفَون: المشرف، التنسيق والمتابعة، مدير الدائرة، ورؤساء الأقسام
    // (قد يسجّلون المشروع ويكلّفون مهندساً، تاركين التاريخ المتوقع ليُدخله المهندس عند الاستلام)
    const jt=(state.appUser?.jobTitle||'');
    const exemptFromDateRule = state.appUser?.role==='admin'
      || jt==='تنسيق ومتابعة' || jt==='مدير الدائرة' || jt.indexOf('رئيس')!==-1;
    if(!exemptFromDateRule){
      const missing=[];
      if(payload.startDate && !payload.endDate) missing.push('المشروع (عام)');
      const deptChecks=[['architectural','القسم المعماري'],['structural','القسم الإنشائي'],['services','قسم تصميم الخدمات']];
      deptChecks.forEach(([k,lbl])=>{
        const s=payload[k]; if(!s) return;
        if(s.startDate && !s.endDate) missing.push(lbl);
      });
      if(missing.length){
        const NL=String.fromCharCode(10);
        alert('يجب تسجيل «تاريخ التسليم المتوقع» عند إدخال «تاريخ الاستلام» في:'+NL+'• '+missing.join(NL+'• ')+NL+NL+'أكمل التواريخ المتوقعة ثم احفظ.');
        return;
      }
    }
    if(!CONFIGURED){alert('قاعدة البيانات غير مُعدّة بعد — أضِف مفاتيح Firebase أولاً لحفظ المشاريع.');return;}
    clearDraft();
    overlay.remove();
    await saveProject(payload, project?.id, project);
  };
  modal.querySelector('#x').onclick=()=>{ if(confirm('إغلاق النموذج؟ سيتم حفظ مسودّة يمكن استعادتها لاحقاً.')){ saveDraft(); overlay.remove(); flushPendingRender(); } };
  form.querySelector('#cancel').onclick=()=>{ if(confirm('إلغاء وإغلاق النموذج؟ ستُحذف المسودّة.')){ clearDraft(); overlay.remove(); flushPendingRender(); } };
  modal.appendChild(form);
  overlay.appendChild(modal);
  // لا يُغلق النموذج بالضغط على الخلفية — حتى لا يُغلق فجأة أثناء الإدخال. الإغلاق فقط عبر ✕ أو إلغاء.
  root.appendChild(overlay);
}
/* هل يحق للمستخدم الحالي تقييم هذا القسم؟ (المشرف أو رئيس القسم نفسه) */
function canEvaluate(prefixKey){
  const u=state.appUser; if(!u) return false;
  if(u.role==='admin') return true;
  const jt=u.jobTitle||'';
  const headTitles={architectural:'رئيس القسم المعماري',structural:'رئيس القسم الإنشائي',services:'رئيس قسم تصميم الخدمات'};
  return jt===headTitles[prefixKey];
}
/* هل يحق له رؤية التقييم؟ (المشرف + مدير الدائرة + المدير العام + أي رئيس قسم) */
function canViewEval(){
  const u=state.appUser; if(!u) return false;
  if(u.role==='admin') return true;
  const jt=u.jobTitle||'';
  return jt==='مدير الدائرة' || jt==='المدير العام' || jt.indexOf('رئيس')!==-1;
}
/* من يفتح التقارير الشهرية: كل من يرى التقييم + موظف التنسيق والمتابعة */
function canViewReports(){
  const u=state.appUser; if(!u) return false;
  if(canViewEval()) return true;
  return (u.jobTitle||'')==='تنسيق ومتابعة';
}
/* هل يحق للمستخدم تعديل بيانات هذا القسم؟
   المشرف ومدير الدائرة: كل الأقسام. رئيس القسم: قسمه. المهندس: قسمه الذي ينتمي إليه فقط. */
function canEditDept(prefixKey){
  const u=state.appUser; if(!u) return false;
  if(u.role==='admin') return true;
  const jt=u.jobTitle||'';
  if(jt==='المدير العام') return false;          // المدير العام: مراقب فقط، لا يعدّل
  if(jt==='مدير الدائرة') return true;          // مدير الدائرة يعدّل الكل
  if(canEvaluate(prefixKey)) return true;        // رئيس القسم لقسمه
  return u.dept===prefixKey;                     // المهندس لقسمه فقط
}
/* المدير العام مراقب فقط: لا ينشئ مشاريع ولا يعدّل الحقول العامة ولا يحذف */
function isObserver(){ return (state.appUser?.jobTitle||'')==='المدير العام'; }
/* هل المستخدم مهندس عادي (له قسم فني ومسنَد للأعمال)؟ */
function isEngineer(){
  const u=state.appUser; if(!u||u.role==='admin') return false;
  if(isObserver()) return false;
  return ['architectural','structural','services'].includes(u.dept);
}
/* هل المهندس الحالي مسنَد لأحد أقسام المشروع؟ */
function projectHasMe(p){
  const u=state.appUser; if(!u) return false;
  return DEPT_MAP.some(([key])=>{
    const sec=p[key]; if(!sec) return false;
    if(Array.isArray(sec.engineers)) return sec.engineers.some(e=>e.username===u.username);
    if(sec.engineerUsername) return sec.engineerUsername===u.username;
    return sec.engineer===u.name;
  });
}
/* هل المشروع منتهٍ فعلياً؟ = حالته «مكتمل»، أو اكتملت كل أقسامه المُسنَدة (بغضّ النظر عن الحالة العامة).
   القاعدة: فكرة مبدئية = المعماري وحده. مشروع فيه قسم غير مُسنَد لا يُعدّ منتهياً. لا يشمل «رأي فني» أو المتوقف/الملغى. */
function isEffectivelyDone(p){
  if(!p) return false;
  if(p.overallStatus==='مكتمل') return true;
  if(p.overallStatus==='متوقف الى اشعار اخر' || p.overallStatus==='الغي المشروع' || p.overallStatus==='رأي فني') return false;
  const isAssigned=(sec)=> !!sec && Array.isArray(sec.engineers) && sec.engineers.length>0;
  const isDone=(sec)=> !!sec && sec.status==='مكتمل';
  const consider = (p.overallStatus==='فكرة مبدئية') ? ['architectural'] : ['architectural','structural','services'];
  const assigned = consider.filter(k=>isAssigned(p[k]));
  return assigned.length>0 && assigned.every(k=>isDone(p[k]));
}
/* من يحقّ له حذف المشروع: المشرف، مدير الدائرة، أو مهندس مسنَد إليه */
function canDeleteProject(p){
  const u=state.appUser; if(!u) return false;
  if(u.role==='admin') return true;
  if(isObserver()) return false;
  if((u.jobTitle||'')==='مدير الدائرة') return true;
  return projectHasMe(p);
}

/* تنبيهات قرب/تجاوز موعد التسليم المتوقع لأقسام المهندس الحالي (غير المكتملة) */
function myDeadlineAlerts(thresholdDays){
  const u=state.appUser; if(!u) return [];
  const out=[];
  const today=new Date(); today.setHours(0,0,0,0);
  state.projects.forEach(p=>{
    DEPT_MAP.forEach(([key,label])=>{
      const sec=p[key]; if(!sec) return;
      if(sec.status==='مكتمل') return;                 // المكتمل لا ينبَّه
      if(!sec.endDate) return;                          // لا تاريخ متوقع
      // هل المهندس الحالي ضمن مهندسي هذا القسم؟
      let mine=false;
      if(Array.isArray(sec.engineers)) mine=sec.engineers.some(e=>e.username===u.username);
      else if(sec.engineerUsername) mine=(sec.engineerUsername===u.username);
      else if(sec.engineer && sec.engineer===u.name) mine=true;
      if(!mine) return;
      const end=new Date(sec.endDate+'T00:00:00');
      if(isNaN(end)) return;
      const days=Math.round((end-today)/86400000);
      if(days<=thresholdDays){                          // ضمن العتبة أو متأخر
        out.push({project:p.name||'—', dept:label, endDate:sec.endDate, days});
      }
    });
  });
  // الأقرب موعداً/الأكثر تأخراً أولاً
  out.sort((a,b)=>a.days-b.days);
  return out;
}
const RATE_FIELDS=[
  ['quality','جودة التصميم'],
  ['requirements','الالتزام بالمتطلبات'],

/* نجوم تقييم ١–٥ */
function starSelect(name,val){
  let opts='<option value="">—</option>';
  for(let i=1;i<=5;i++) opts+=`<option value="${i}" ${String(val)===String(i)?'selected':''}>${i} ${'★'.repeat(i)}</option>`;
  return `<select class="inp" name="${name}" style="font-size:12px">${opts}</select>`;
}

  }else if(canViewEval() && d.eval && (d.eval.work||d.eval.engineer||d.eval.done||d.eval.delay||d.eval.notes)){

  const lockNote='<span style="color:var(--stop)" title="مقفل — لا يعدّله إلا المشرف أو رئيس القسم"> 🔒</span>';

  const deptEngineers=state.users.filter(u=>u.role!=='admin' && u.dept===prefixKey)
    .sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));

  let selected=[];
  if(Array.isArray(d.engineers)) selected=d.engineers.map(e=>e.username).filter(Boolean);
  else if(d.engineerUsername) selected=[d.engineerUsername];
  // اسم قديم مكتوب يدوياً وغير مربوط بحساب

  const lockedHdr = canEdit ? '' : '<span style="color:var(--muted);font-size:11px;font-weight:600"> 🔒 قسم غير قابل للتعديل</span>';

    <label class="lbl-sm" style="margin-top:4px">رابط مسار العمل (مجلّد القسم على الشبكة)</label>
    <input class="inp" name="${pf}_workLink" value="${(d.workLink||'').replace(/"/g,'&quot;')}" placeholder="مثال: \\\\server\\projects\\... أو https://" style="direction:ltr;text-align:left;font-size:12px" ${DIS}>
    ${rateBlock}
  </div>`;
}
/* شارة المقارنة بين التسليم المتوقع والفعلي */
function deliveryBadge(expected, actual){
  if(!actual) return '';
  if(!expected) return `<span style="font-size:11px;color:var(--muted)">—</span>`;
  const e=new Date(expected), a=new Date(actual);
  const days=Math.round((a-e)/86400000);
  if(days>0) return `<span style="font-size:11px;font-weight:700;color:#b3261e;background:#fbe9e7;padding:2px 9px;border-radius:20px">متأخر ${days} يوم</span>`;
  if(days<0) return `<span style="font-size:11px;font-weight:700;color:#1f5d4c;background:#e6f0ec;padding:2px 9px;border-radius:20px">مبكّر ${Math.abs(days)} يوم</span>`;
  return `<span style="font-size:11px;font-weight:700;color:#1f5d4c;background:#e6f0ec;padding:2px 9px;border-radius:20px">في الموعد</span>`;
}
/* متوسط التقييم (يدعم البنود الجديدة والقديمة معاً) */
function ratingAvg(ev){
  if(!ev) return null;
  const keys=['quality','requirements','communication','challenges','delay','work','engineer','done'];
  const vals=keys.map(k=>Number(ev[k])).filter(n=>n>=1&&n<=5);
  if(!vals.length) return null;
  return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
}

/* تعديل بيانات مستخدم موجود (خاصة إضافة البريد للحسابات القديمة) */
function openEditUser(u){
  const overlay=$(`<div class="overlay"></div>`);

    <button class="icon-btn" id="x">${I.close}</button></div></div>`);

    .map(([v,l])=>`<option value="${v}" ${v===(u.dept||'')?'selected':''}>${l}</option>`).join('');
  form.innerHTML=`
    <div class="field"><label class="lbl-sm">الاسم الكامل</label><input class="inp" name="name" value="${u.name||''}"></div>
    <div class="field"><label class="lbl-sm">المسمى الوظيفي</label><select class="inp" name="jobTitle">${jobOpts}</select></div>
    <div class="field"><label class="lbl-sm">القسم الفني</label><select class="inp" name="dept">${deptOpts}</select></div>

/* ════════════ زيارات المواقع والاجتماعات ════════════ */
const ACTIVITY_DEPTS=[['all','جميع الأقسام والدائرة'],['administration','الإدارة'],['architectural','القسم المعماري'],['structural','القسم الإنشائي'],['services','قسم تصميم الخدمات']];

/* يبني واجهة اختيار القسم ثم أشخاصه (اختيار متعدد) — مشتركة بين الزيارة والاجتماع */
function buildPeoplePicker(initialDept, initialUsernames){
  const selDept = initialDept || '';
  const deptSel=`<label class="lbl-sm">القسم</label>
    <select class="inp" id="ap_dept">
      <option value="">— اختر القسم —</option>
      ${ACTIVITY_DEPTS.map(([v,l])=>`<option value="${v}" ${v===selDept?'selected':''}>${l}</option>`).join('')}
    </select>`;
  return `<div class="field">${deptSel}</div>
    <div class="field"><label class="lbl-sm">الأشخاص (يمكن اختيار أكثر من واحد)</label>
      <div id="ap_people"></div></div>`;
}
/* يملأ قائمة الأشخاص حسب القسم المختار */
function renderPeopleOptions(host, dept, selected){
  selected=selected||[];
  if(!dept){ host.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:6px 0">اختر القسم أولاً لعرض الأسماء.</div>`; return; }
  // مسميات القيادة التي تظهر أيضاً ضمن «الإدارة»
  const LEAD_TITLES=['رئيس القسم المعماري','رئيس القسم الإنشائي','رئيس قسم تصميم الخدمات','مدير الدائرة','المدير العام'];
  const DEPT_AR_SHORT={architectural:'المعماري',structural:'الإنشائي',services:'الخدمات',administration:'الإدارة'};
  let people;
  if(dept==='all'){
    // كل موظفي الدائرة (جميع الأقسام)
    people=state.users.filter(u=>u.role!=='admin');
  }else{
    people=state.users.filter(u=>u.role!=='admin' && u.dept===dept);
    if(dept==='administration'){
      const have=new Set(people.map(u=>u.username));
      state.users.forEach(u=>{
        if(u.role!=='admin' && LEAD_TITLES.includes(u.jobTitle||'') && !have.has(u.username)){
          people.push(u); have.add(u.username);
        }
      });
    }
  }
  people=people.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
  if(!people.length){ host.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:6px 0">لا يوجد أشخاص مسجّلون.</div>`; return; }
  // عند «الجميع» أضِف زر تحديد الكل
  const selectAll = dept==='all' ? `<label class="eng-opt" style="background:var(--oasis-50);font-weight:700"><input type="checkbox" id="ap_all"> تحديد جميع الموظفين</label>` : '';
  host.innerHTML=`<div class="eng-multi">${selectAll}${people.map(u=>{
    const showHint = (dept==='administration'||dept==='all') && u.dept && u.dept!=='administration';
    const hint = showHint ? ` <span style="color:var(--muted);font-size:11px">(${DEPT_AR_SHORT[u.dept]||''})</span>` : '';
    return `<label class="eng-opt"><input type="checkbox" value="${u.username}" ${selected.includes(u.username)?'checked':''}> ${u.name}${hint}</label>`;
  }).join('')}</div>`;
  // ربط زر تحديد الكل
  const allCb=host.querySelector('#ap_all');
  if(allCb) allCb.onchange=()=>{ host.querySelectorAll('input[type="checkbox"][value]').forEach(cb=>cb.checked=allCb.checked); };
}
/* يجمع الأشخاص المختارين {username,name} */
function collectPeople(host){
  const arr=[];
  host.querySelectorAll('input[type="checkbox"]:checked').forEach(cb=>{
    const u=state.users.find(x=>x.username===cb.value);
    if(u) arr.push({username:u.username,name:u.name});
  });
  return arr;
}

/* اختصار نصّ للعرض المبدئي */
function _rwTrunc(t,n){ t=String(t||''); return t.length>n ? t.slice(0,n).trim()+'…' : t; }
/* نافذة عرض كامل تفاصيل زيارة/اجتماع (قراءة فقط) */
function openActivityDetail(a, kind){
  if(!a) return;

  const row=(label,val)=> val ? `<div style="margin-bottom:12px"><div style="font-size:12px;color:var(--oasis-700);font-weight:700;margin-bottom:3px">${label}</div><div style="font-size:13.5px;color:var(--ink);line-height:1.8;white-space:pre-wrap">${val}</div></div>` : '';
  const block=(label,val)=> val ? `<div style="margin-bottom:14px"><div style="font-size:12px;color:var(--oasis-700);font-weight:700;margin-bottom:4px">${label}</div><div style="font-size:13.5px;color:var(--ink);line-height:1.9;white-space:pre-wrap;background:var(--sand-100);border-radius:10px;padding:12px 14px">${val}</div></div>` : '';
  body.innerHTML=`

    ${row('الأشخاص', a.personNames||'—')}
    ${row('الموقع', a.location)}
    ${row(kind==='meeting'?'الغرض من الاجتماع':'الغرض من الزيارة', a.purpose)}
    ${block(kind==='meeting'?'محضر الاجتماع':'تفاصيل / ملاحظات الزيارة', a.minutes)}
    ${block('ملاحظات', a.notes)}
    <div style="font-size:11px;color:var(--muted);margin-top:6px">سجّله: ${a.createdBy||'—'}${a.createdAt?` · ${a.createdAt}`:''}</div>`;
  modal.appendChild(body);overlay.appendChild(modal);
  modal.querySelector('#x').onclick=()=>overlay.remove();

/* يربط نقر بطاقات النشاط لفتح التفاصيل (مع تجاهل أزرار التعديل/الحذف) */
function wireActivityCards(scope, getItem){
  scope.querySelectorAll('.act-card[data-view-act]').forEach(card=>{
    card.onclick=(e)=>{
      if(e.target.closest('[data-noview]')) return;   // لا تفتح عند الضغط على تعديل/حذف
      const id=card.getAttribute('data-view-act'), kind=card.getAttribute('data-kind');
      const item=getItem(kind,id);
      if(item) openActivityDetail(item, kind);
    };
  });
}
/* حالة الشهور المفتوحة (تبقى بين عمليات إعادة الرسم) */
const _actOpenMonths={ visit:new Set(), meeting:new Set() };
/* يعرض قائمة الزيارات/الاجتماعات مجمّعة بالشهور مع طيّ/فتح */
function renderActivitiesByMonth(list, kind){
  if(!list.length) return `<div style="text-align:center;color:var(--muted);padding:24px">لا توجد ${kind==='meeting'?'اجتماعات':'زيارات'} مسجّلة.</div>`;
  // ترتيب تنازلي بالتاريخ ثم تجميع بالشهر
  const sorted=list.slice().sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  const groups=[]; const idx={};
  sorted.forEach(a=>{
    const key=ym(a.date)||'—';
    if(idx[key]===undefined){ idx[key]=groups.length; groups.push({key,items:[]}); }
    groups[idx[key]].items.push(a);
  });
  // افتح أحدث شهر افتراضياً إن لم يُفتح شيء بعد
  const openSet=_actOpenMonths[kind];
  if(openSet.size===0 && groups.length){ openSet.add(groups[0].key); }
  return groups.map(g=>{
    const isOpen=openSet.has(g.key);
    const label = g.key==='—' ? 'بدون تاريخ' : monthLabelStd(g.key);
    const cards = g.items.map(a=>activityCard(a,kind)).join('');
    return `<div class="act-month" data-mkey="${g.key}">
      <button class="act-month-head ${isOpen?'open':''}" data-mtoggle="${g.key}" data-kind="${kind}">
        <span class="amh-title">${label}</span>
        <span class="amh-count">${g.items.length}</span>
        <span class="amh-chev">${isOpen?'▾':'‹'}</span>
      </button>
      <div class="act-month-body" style="${isOpen?'':'display:none'}">${cards}</div>
    </div>`;
  }).join('');
}
/* يربط أزرار طيّ/فتح الشهور ثم يعيد ربط بطاقات النشاط الظاهرة */
function wireActivityMonths(scope, kind, getItem){
  scope.querySelectorAll('[data-mtoggle]').forEach(btn=>{
    btn.onclick=()=>{
      const key=btn.getAttribute('data-mtoggle');
      const set=_actOpenMonths[kind];
      if(set.has(key)) set.delete(key); else set.add(key);
      const bodyEl=btn.parentElement.querySelector('.act-month-body');
      const open=set.has(key);
      btn.classList.toggle('open',open);
      const chev=btn.querySelector('.amh-chev'); if(chev) chev.textContent=open?'▾':'‹';
      if(bodyEl) bodyEl.style.display=open?'':'none';
    };
  });
  wireActivityCards(scope, getItem);
}

let myActsModalOpen=false;

      <div class="divider"></div>

      ${meetings.length? meetings.map(m=>myActCard(m,'meeting')).join('') : '<div style="color:var(--muted);font-size:13px;padding:6px 0">لا توجد اجتماعات.</div>'}`;
    body.querySelectorAll('[data-edit-act]').forEach(b=>{
      b.onclick=()=>{ const kind=b.getAttribute('data-kind'); const id=b.getAttribute('data-edit-act'); openEditActivity(kind,id,fill); };
    });
    body.querySelectorAll('[data-del-act]').forEach(b=>{

/* ═══════════ «أعمالي» — توثيق أعمال موظفة التنسيق والمتابعة ═══════════ */
const MYWORK_CATS=[
  ['followup','متابعة موظفين'],
  ['engineers','متابعة تسليمات/مهام المهندسين'],
  ['letter','إعداد رسالة/مخاطبة'],
  ['report','إعداد تقرير'],
  ['other','مهمة أخرى'],
];
const MYWORK_CAT_AR=Object.fromEntries(MYWORK_CATS);
function todayISO(){ return new Date().toISOString().slice(0,10); }
let myWorksModalOpen=false;
function openMyWorksModal(){
  if(document.getElementById('myWorksOverlay')) return;
  if(!canSeeMyWorks()){ alert('هذه الخانة مخصّصة لموظفة التنسيق والمتابعة والإدارة.'); return; }
  myWorksModalOpen=true;
  const canEdit=canEditMyWorks();
  const overlay=$(`<div class="overlay" id="myWorksOverlay"></div>`);
  const modal=$(`<div class="modal modal-lg"><div class="modal-head"><h2>أعمالي — التنسيق والمتابعة</h2>
    <button class="icon-btn" id="x">${I.close}</button></div></div>`);
  const body=document.createElement('div');body.className='modal-body';
  modal.appendChild(body);overlay.appendChild(modal);
  let tab='today';           // today | log | archive
  let selDate=todayISO();     // لليوم المختار في تبويب المهام اليومية
  let fCat='';                // فلتر التصنيف في الأرشيف
  let fFrom='', fTo='';       // فلتر التاريخ في الأرشيف

  function tasks(){ return state.myworks.filter(w=>w.type==='task'); }
  function logs(){ return state.myworks.filter(w=>w.type==='log'); }

  function tabsBar(){
    const t=(id,lbl)=>`<button class="mw-tab ${tab===id?'active':''}" data-tab="${id}">${lbl}</button>`;
    return `<div class="mw-tabs">${t('today','مهامي اليومية')}${t('log','توثيق عمل')}${t('archive','سجلّي')}</div>`;
  }

  /* ── تبويب المهام اليومية ── */
  function renderToday(){
    const ts=tasks();
    const rows=ts.map(t=>{
      const done=(t.doneDates&&t.doneDates[selDate])?true:false;
      return `<div class="mw-taskrow ${done?'done':''}">
        ${canEdit?`<button class="mw-check ${done?'on':''}" data-toggle="${t.id}">${done?'✓':''}</button>`:`<span class="mw-check ${done?'on':''}">${done?'✓':''}</span>`}
        <span class="mw-taskname">${t.title}</span>
        ${canEdit?`<button class="mw-del" data-deltask="${t.id}" title="حذف المهمة">${I.trash}</button>`:''}
      </div>`;
    }).join('');
    const doneCount=ts.filter(t=>t.doneDates&&t.doneDates[selDate]).length;
    return `
      <div class="mw-daybar">
        <label>اليوم:</label>
        <input type="date" id="mwDate" value="${selDate}" max="${todayISO()}">
        <span class="mw-daycount">${doneCount}/${ts.length} منجزة</span>
      </div>
      ${ts.length? `<div class="mw-tasklist">${rows}</div>` : '<div class="mw-empty">لا توجد مهام يومية بعد. أضيفي مهامك المتكررة أدناه لتظهر كل يوم.</div>'}
      ${canEdit?`
      <div class="mw-addbox">
        <input type="text" id="mwNewTask" placeholder="مهمة يومية متكررة (مثال: مراجعة تسليمات المهندسين)">
        <button class="btn btn-add" id="mwAddTask">إضافة مهمة</button>
      </div>`:''}`;
  }

  /* ── تبويب توثيق عمل (نموذج إضافة سجلّ) ── */
  function renderLogForm(){
    if(!canEdit) return '<div class="mw-empty">التوثيق من صلاحية موظفة التنسيق فقط. يمكنك الاطلاع على السجلّ من تبويب «سجلّي».</div>';
    return `
      <div class="mw-form">
        <label class="lbl-sm">عنوان العمل</label>
        <input type="text" id="lgTitle" placeholder="مثال: إعداد مخاطبة إلى دائرة المشاريع">
        <label class="lbl-sm">التصنيف</label>
        <select id="lgCat">${MYWORK_CATS.map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
        <label class="lbl-sm">التاريخ</label>
        <input type="date" id="lgDate" value="${todayISO()}">
        <label class="lbl-sm">الحالة</label>
        <select id="lgStatus"><option value="done">منجَز</option><option value="wip">قيد التنفيذ</option></select>
        <label class="lbl-sm">الوصف</label>
        <textarea id="lgDesc" rows="3" placeholder="تفاصيل العمل..."></textarea>
        <label class="lbl-sm">ملاحظات (اختياري)</label>
        <textarea id="lgNotes" rows="2" placeholder="ملاحظات إضافية..."></textarea>
        <button class="btn btn-add" id="lgSave" style="margin-top:10px">حفظ العمل</button>
      </div>`;
  }

  /* ── تبويب السجلّ/الأرشيف ── */
  function renderArchive(){
    let arr=logs().slice();
    if(fCat) arr=arr.filter(w=>w.category===fCat);
    if(fFrom) arr=arr.filter(w=>(w.date||'')>=fFrom);
    if(fTo) arr=arr.filter(w=>(w.date||'')<=fTo);
    arr.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
    const cards=arr.map(w=>{
      const st = w.status==='done' ? '<span class="mw-badge done">منجَز</span>' : '<span class="mw-badge wip">قيد التنفيذ</span>';
      return `<div class="mw-logcard">
        <div class="mw-logtop">
          <span class="mw-cat">${MYWORK_CAT_AR[w.category]||'—'}</span>
          <span class="mw-date">${dmy(w.date)||'—'}</span>
        </div>
        <div class="mw-logtitle">${w.title||'—'} ${st}</div>
        ${w.desc?`<div class="mw-logdesc">${w.desc}</div>`:''}
        ${w.notes?`<div class="mw-lognotes">ملاحظات: ${w.notes}</div>`:''}
        ${canEdit?`<div class="mw-logacts"><button class="mw-del" data-dellog="${w.id}" title="حذف">${I.trash}</button></div>`:''}
      </div>`;
    }).join('');
    return `
      <div class="mw-filters">
        <select id="afCat"><option value="">كل التصنيفات</option>${MYWORK_CATS.map(([k,v])=>`<option value="${k}" ${fCat===k?'selected':''}>${v}</option>`).join('')}</select>
        <label>من</label><input type="date" id="afFrom" value="${fFrom}">
        <label>إلى</label><input type="date" id="afTo" value="${fTo}">
        <button class="btn btn-ghost" id="afExport">⬇ تصدير Excel</button>
      </div>
      <div class="mw-archsum">${arr.length} عمل موثّق</div>
      ${arr.length? `<div class="mw-loglist">${cards}</div>` : '<div class="mw-empty">لا توجد أعمال موثّقة ضمن التصفية.</div>'}`;
  }

  function fill(){
    body.innerHTML = tabsBar() + `<div class="mw-pane">${
      tab==='today'?renderToday() : tab==='log'?renderLogForm() : renderArchive()
    }</div>`;
    // تبويبات
    body.querySelectorAll('.mw-tab').forEach(b=>b.onclick=()=>{ tab=b.getAttribute('data-tab'); fill(); });
    // مهام يومية
    const dInp=body.querySelector('#mwDate'); if(dInp) dInp.onchange=()=>{ selDate=dInp.value||todayISO(); fill(); };
    body.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=async()=>{ await toggleTask(b.getAttribute('data-toggle'), selDate); });
    body.querySelectorAll('[data-deltask]').forEach(b=>b.onclick=async()=>{ if(confirm('حذف هذه المهمة اليومية نهائياً؟')){ await FB.deleteDoc(FB.doc(db,'artifacts',APP_ID,'public','data','myworks',b.getAttribute('data-deltask'))); } });
    const addT=body.querySelector('#mwAddTask'); if(addT) addT.onclick=async()=>{
      const inp=body.querySelector('#mwNewTask'); const v=(inp.value||'').trim();
      if(!v){ inp.focus(); return; }
      await FB.addDoc(myworksRef(),{type:'task',title:v,doneDates:{},createdAt:new Date().toISOString(),by:state.appUser?.name||'',byUsername:state.appUser?.username||''});
      inp.value='';
    };
    // حفظ عمل موثّق
    const save=body.querySelector('#lgSave'); if(save) save.onclick=async()=>{
      const g=id=>body.querySelector(id);
      const title=(g('#lgTitle').value||'').trim();
      if(!title){ g('#lgTitle').focus(); return; }
      await FB.addDoc(myworksRef(),{type:'log',title,
        category:g('#lgCat').value, date:g('#lgDate').value||todayISO(),
        status:g('#lgStatus').value, desc:(g('#lgDesc').value||'').trim(),
        notes:(g('#lgNotes').value||'').trim(),
        createdAt:new Date().toISOString(), by:state.appUser?.name||'', byUsername:state.appUser?.username||''});
      tab='archive'; fill();
    };
    // أرشيف: فلاتر + تصدير + حذف
    const afc=body.querySelector('#afCat'); if(afc) afc.onchange=()=>{ fCat=afc.value; fill(); };
    const aff=body.querySelector('#afFrom'); if(aff) aff.onchange=()=>{ fFrom=aff.value; fill(); };
    const aft=body.querySelector('#afTo'); if(aft) aft.onchange=()=>{ fTo=aft.value; fill(); };
    const afx=body.querySelector('#afExport'); if(afx) afx.onclick=()=>exportMyWorks(fCat,fFrom,fTo);
    body.querySelectorAll('[data-dellog]').forEach(b=>b.onclick=async()=>{ if(confirm('حذف هذا العمل الموثّق؟')){ await FB.deleteDoc(FB.doc(db,'artifacts',APP_ID,'public','data','myworks',b.getAttribute('data-dellog'))); } });
  }
  fill(); overlay._refresh=fill;
  modal.querySelector('#x').onclick=()=>{myWorksModalOpen=false;overlay.remove();};
  overlay.onclick=(e)=>{if(e.target===overlay){myWorksModalOpen=false;overlay.remove();}};
  root.appendChild(overlay);

/* ════════════ النسخ الاحتياطي (للمشرف) ════════════ */
async function exportBackup(){
  if(!CONFIGURED){alert('قاعدة البيانات غير مُعدّة.');return;}
  try{
    const cols=['projects','users','options','stats'];
    const backup={ _app:'central-design', _version:1, _exportedAt:new Date().toISOString(), data:{} };
    for(const c of cols){
      const snap=await FB.getDocs(FB.collection(db,'artifacts',APP_ID,'public','data',c));
      backup.data[c]=snap.docs.map(d=>({id:d.id,...d.data()}));
    }
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const stamp=new Date().toISOString().slice(0,10);
    a.href=url; a.download=`نسخة_احتياطية_${stamp}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    const counts=Object.entries(backup.data).map(([k,v])=>`${k}: ${v.length}`).join(' · ');
    alert(`تم تصدير النسخة الاحتياطية بنجاح.${String.fromCharCode(10)}(${counts})`);
  }catch(e){console.error(e);alert('تعذّر التصدير، حاول مرة أخرى.');}
}
async function importBackup(file,mode){
  if(!CONFIGURED||!file) return;
  try{
    const text=await file.text();
    const backup=JSON.parse(text);
    if(!backup||!backup.data){alert('الملف غير صالح كنسخة احتياطية.');return;}
    const cols=['projects','users','options','stats'];

    // وضع الاستبدال: امسح القائم أولاً
    if(mode==='replace'){
      for(const c of cols){
        const snap=await FB.getDocs(FB.collection(db,'artifacts',APP_ID,'public','data',c));
        const batch=FB.writeBatch(db);
        snap.forEach(d=>batch.delete(d.ref));
        await batch.commit();
      }
    }
    // اكتب البيانات من النسخة (مع الحفاظ على المعرّفات)
    let total=0;
    for(const c of cols){
      const items=backup.data[c]||[];
      for(const it of items){
        const {id,...rest}=it;
        const ref = id ? FB.doc(db,'artifacts',APP_ID,'public','data',c,id)
                       : FB.doc(FB.collection(db,'artifacts',APP_ID,'public','data',c));
        await FB.setDoc(ref,rest);
        total++;
      }
    }
    alert(`تمت الاستعادة بنجاح (${total} سجل). سيُحدَّث العرض تلقائياً.`);
  }catch(e){console.error(e);alert('تعذّرت الاستعادة. تأكد أن الملف نسخة احتياطية صحيحة.');}
}

/* تقرير مهندس واحد بالرقم الوظيفي: أعماله القائمة والمنجزة + تقييمه المفصّل */
function engineerReport(username){
  const u=state.users.find(x=>x.username===username);
  const name=u?u.name:username;
  const active=[], done=[];
  const critSum={quality:[],requirements:[],communication:[],challenges:[],delay:[]};
  state.projects.forEach(p=>{
    DEPT_MAP.forEach(([key,label])=>{
      const sec=p[key]; if(!sec) return;
      // المطابقة بالرقم الوظيفي ضمن قائمة مهندسي القسم (تدعم الجديد والقديم)
      let inSection=false;
      if(Array.isArray(sec.engineers)) inSection=sec.engineers.some(e=>e.username===username);
      else if(sec.engineerUsername) inSection=(sec.engineerUsername===username);
      else if(sec.engineer && u && sec.engineer===u.name) inSection=true; // قديم بالاسم
      if(!inSection) return;   // أقسام هذا المهندس فقط — لا أقسام زملائه
      const st=sec.status||'قيد الانتظار';
      const ev=sec.eval; const avg=ratingAvg(ev);
      const item={project:p.name||'—',dept:label,status:st,endDate:sec.endDate||'',avg};
      if(st==='مكتمل') done.push(item); else active.push(item);
      if(ev){ ['quality','requirements','communication','challenges','delay'].forEach(c=>{const v=Number(ev[c]); if(v>=1&&v<=5) critSum[c].push(v);}); }
    });
  });
  const critLabels={quality:'جودة التصميم',requirements:'الالتزام بالمتطلبات',communication:'التواصل والتعاون',challenges:'التعامل مع التحديات',delay:'الالتزام بالوقت'};
  const avgOf=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):null;
  const allVals=[].concat(...Object.values(critSum));
  const overall=allVals.length?(allVals.reduce((a,b)=>a+b,0)/allVals.length).toFixed(1):null;
  const showRatings=canViewEval();   // التنسيق لا يرى التقييمات

  // الآراء الفنية: مشاريع وضعها العام «رأي فني» وهذا المهندس مسنَد لأحد أقسامها
  const opinions=[];
  state.projects.forEach(p=>{
    if(p.overallStatus!=='رأي فني') return;
    let mine=false;
    DEPT_MAP.forEach(([key])=>{
      const sec=p[key]; if(!sec) return;
      if(Array.isArray(sec.engineers)){ if(sec.engineers.some(e=>e.username===username)) mine=true; }
      else if(sec.engineerUsername===username) mine=true;
      else if(sec.engineer && u && sec.engineer===u.name) mine=true;
    });
    if(mine) opinions.push({project:p.name||'—', entity:p.requestingEntity||''});
  });
  // الزيارات والاجتماعات التي شارك فيها (بالرقم الوظيفي)
  const inPersons=(arr)=> Array.isArray(arr) && arr.some(x=>x.username===username);
  const myVisits=state.visits.filter(v=>inPersons(v.persons)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const myMeetings=state.meetings.filter(m=>inPersons(m.persons)).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const itemRow=(it)=>{
    const [c,bg]=SEC_STYLE[it.status]||SEC_STYLE['قيد الانتظار'];
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13px;padding:8px 0;border-top:1px dashed var(--line)">
      <span><b>${it.project}</b> <span style="color:var(--muted)">· ${it.dept}</span></span>
      <span style="display:flex;gap:6px;align-items:center;white-space:nowrap">
        ${(showRatings && it.avg)?`<span style="color:var(--stop);font-weight:700">${it.avg}★</span>`:''}
        <span class="sec-badge" style="color:${c};background:${bg}">${it.status}</span></span>
    </div>`;
  };

  return `
    <div style="background:var(--oasis-50);border-radius:12px;padding:14px;margin-bottom:14px;text-align:center">
      <div style="font-family:'Cairo';font-weight:800;font-size:18px;color:var(--oasis-700)">${name}</div>
      <div style="font-size:12px;color:var(--muted)" class="ltr">${username}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">إجمالي الأعمال: ${active.length+done.length} · المنجز: ${done.length} · القائم: ${active.length}</div>
      ${showRatings?(overall?`<div style="margin-top:8px;font-size:22px;font-weight:800;color:var(--stop)">${overall} ★</div><div style="font-size:11px;color:var(--muted)">التقييم الإجمالي</div>`:`<div style="margin-top:8px;font-size:13px;color:var(--muted)">لا يوجد تقييم بعد</div>`):''}
    </div>

    ${(showRatings && overall)?`<div style="background:var(--sand-50);border:1px solid var(--line);border-radius:11px;padding:13px;margin-bottom:14px">
      <div style="font-weight:700;color:var(--oasis-700);margin-bottom:9px;font-size:14px">تفصيل التقييم</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">
        ${Object.entries(critLabels).map(([c,l])=>{const a=avgOf(critSum[c]);return `<div style="display:flex;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 10px"><span style="color:var(--muted)">${l}</span><b style="color:${a?'var(--stop)':'var(--muted)'}">${a?a+'★':'—'}</b></div>`;}).join('')}
      </div>
    </div>`:''}

    <div style="margin-bottom:14px">
      <div style="font-weight:700;color:var(--oasis-700);margin-bottom:4px;font-size:14px">الأعمال القائمة (${active.length})</div>
      ${active.length?active.map(itemRow).join(''):'<div style="font-size:13px;color:var(--muted);padding:8px 0">لا توجد أعمال قائمة.</div>'}

/* ════════════ لوحة مؤشرات الأداء (KPIs) ════════════ */
let kpiModalOpen=false;
let kpiPeriod='all';   // all | month | quarter | half | year (يُحدّث من القائمة)
/* حساب الفرق بالأيام بين تاريخين YYYY-MM-DD */
function daysBetween(a,b){ if(!a||!b) return null; const d=(new Date(b)-new Date(a))/86400000; return isNaN(d)?null:Math.round(d); }
/* يعيد {from,to} للفترة المختارة بناءً على تاريخ اليوم */
function kpiRange(period){
  const now=new Date(); const y=now.getFullYear(), m=now.getMonth();
  const mk=(yy,mm,dd)=>new Date(yy,mm,dd);
  if(period==='month')   return {from:mk(y,m,1), to:mk(y,m+1,0), label:`شهر ${MONTH_NAMES?MONTH_NAMES[m]:m+1} ${y}`};
  if(period==='quarter'){ const q=Math.floor(m/3); return {from:mk(y,q*3,1), to:mk(y,q*3+3,0), label:`الربع ${q+1} لعام ${y}`}; }
  if(period==='half'){ const h=m<6?0:6; return {from:mk(y,h,1), to:mk(y,h+6,0), label:`نصف ${m<6?'أول':'ثاني'} ${y}`}; }
  if(period==='year')    return {from:mk(y,0,1), to:mk(y,12,0), label:`عام ${y}`};
  return {from:null,to:null,label:'كل الفترات'};
}
/* هل يقع التاريخ ضمن الفترة المختارة؟ (إن كانت all يُقبل الكل) */
function inKpiPeriod(dateStr){
  if(kpiPeriod==='all') return true;
  if(!dateStr) return false;
  const d=new Date(dateStr); if(isNaN(d)) return false;
  const {from,to}=kpiRange(kpiPeriod);
  return d>=from && d<=to;
}
/* التاريخ المرجعي للقسم في الفلترة: الفعلي إن وُجد، وإلا المتوقع */
function secRefDate(sec){ return sec.actualDate || sec.endDate || sec.startDate || ''; }
/* مؤشرات قسم واحد عبر كل المشاريع (ضمن الفترة المختارة) */
function deptKpi(key){
  let total=0, done=0, wip=0, waiting=0, onTime=0, late=0, delaySum=0, delayCount=0;
  const ratings=[];
  state.projects.forEach(p=>{
    const sec=p[key]; if(!sec) return;
    const used = (Array.isArray(sec.engineers)&&sec.engineers.length) || sec.engineer || sec.startDate || sec.endDate || (sec.status && sec.status!=='قيد الانتظار');
    if(!used) return;
    if(!inKpiPeriod(secRefDate(sec))) return;   // فلترة زمنية
    total++;
    const st=sec.status||'قيد الانتظار';
    if(st==='مكتمل') done++; else if(st==='قيد العمل') wip++; else waiting++;
    if(st==='مكتمل' && sec.endDate && sec.actualDate){
      const diff=daysBetween(sec.endDate, sec.actualDate);
      if(diff!==null){ if(diff<=0) onTime++; else late++; if(diff>0){ delaySum+=diff; delayCount++; } }
    }
    const avg=ratingAvg(sec.eval); if(avg) ratings.push(Number(avg));
  });
  const completion = total? Math.round(done/total*100):0;
  const punctuality = (onTime+late)? Math.round(onTime/(onTime+late)*100):null;
  const avgDelay = delayCount? (delaySum/delayCount).toFixed(1):null;
  const avgRating = ratings.length? (ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):null;
  return {total,done,wip,waiting,completion,punctuality,avgDelay,avgRating,onTime,late};
}
/* عدد مراحل الرأي الفني التي قدّمها المهندس — تُحتسب كمنجزات مستقلة (جهد ووقت لكل رأي)
   accept(dateStr) دالة تقرّر إن كانت المرحلة ضمن الفترة المطلوبة. */
function opinionCreditFor(u, accept){
  let n=0;
  state.projects.forEach(p=>{
    if(!Array.isArray(p.opinionStages)) return;
    p.opinionStages.forEach(s=>{
      const mine = (s.by && u.name && s.by===u.name) || (s.byUsername && s.byUsername===u.username);
      if(!mine) return;
      if(accept && !accept(s.date)) return;
      n++;
    });
  });
  return n;
}
/* مؤشرات مهندس (ضمن الفترة المختارة) */
function engineerKpiList(){
  const engs=state.users.filter(u=>u.role!=='admin' && ['architectural','structural','services'].includes(u.dept));
  return engs.map(u=>{
    let total=0,done=0,onTime=0,late=0; const ratings=[];
    state.projects.forEach(p=>DEPT_MAP.forEach(([key])=>{
      const sec=p[key]; if(!sec) return;
      let mine=false;
      if(Array.isArray(sec.engineers)) mine=sec.engineers.some(e=>e.username===u.username);
      else if(sec.engineerUsername) mine=(sec.engineerUsername===u.username);
      else if(sec.engineer===u.name) mine=true;
      if(!mine) return;
      if(!inKpiPeriod(secRefDate(sec))) return;   // فلترة زمنية
      total++; if((sec.status||'')==='مكتمل'){ done++;
        if(sec.endDate&&sec.actualDate){ const d=daysBetween(sec.endDate,sec.actualDate); if(d!==null){ if(d<=0)onTime++; else late++; } } }
      const a=ratingAvg(sec.eval); if(a) ratings.push(Number(a));
    }));
    const completion=total?Math.round(done/total*100):0;
    const punctuality=(onTime+late)?Math.round(onTime/(onTime+late)*100):null;
    const avgRating=ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):null;
    // رصيد مراحل الرأي الفني: كل مرحلة رأي = منجَز مستقل (يُضاف للكمّية دون المساس بالالتزام/التقييم)
    const opinionCount = opinionCreditFor(u, (d)=>inKpiPeriod(d));
    const total2 = total + opinionCount;
    const done2  = done + opinionCount;
    const completion2 = total2?Math.round(done2/total2*100):0;
    return {name:u.name,username:u.username,total:total2,done:done2,completion:completion2,punctuality,avgRating,onTime,doneCount:done2,opinionCount};
  }).filter(e=>e.total>0).sort((a,b)=>b.completion-a.completion);
}
/* بداية احتساب موظف الشهر: لا تُحتسب الأعمال المؤرشفة قبل انطلاق التطبيق فعلياً */
const EOM_START = new Date(2026, 6, 1);   // 1 يوليو 2026 (الشهر = 6)
/* يحسب موظف الشهر لنطاق شهري محدّد {from,to} (مستقل عن فلتر اللوحة) */
function employeeOfMonthFor(from, to){
  // اقصر بداية النطاق عند تاريخ انطلاق الاحتساب (منعاً لاحتساب الأعمال السابقة المؤرشفة)
  if(from < EOM_START) from = EOM_START;
  if(to < EOM_START) return null;   // نطاق كامل قبل الانطلاق ⇒ لا احتساب
  const engs=state.users.filter(u=>u.role!=='admin' && ['architectural','structural','services'].includes(u.dept));
  const inRange=(dateStr)=>{ if(!dateStr) return false; const d=new Date(dateStr); return !isNaN(d)&&d>=from&&d<=to; };
  const list=engs.map(u=>{
    let done=0,onTime=0,late=0; const ratings=[];
    state.projects.forEach(p=>DEPT_MAP.forEach(([key])=>{
      const sec=p[key]; if(!sec) return;
      let mine=false;
      if(Array.isArray(sec.engineers)) mine=sec.engineers.some(e=>e.username===u.username);
      else if(sec.engineerUsername) mine=(sec.engineerUsername===u.username);
      else if(sec.engineer===u.name) mine=true;
      if(!mine) return;
      if((sec.status||'')!=='مكتمل') return;
      // العدالة: يُحتسب فقط المشروع الذي تاريخ استلامه ضمن فترة الاحتساب (لا الأعمال المؤرشفة السابقة)
      const recv = sec.startDate ? new Date(sec.startDate) : null;
      if(!recv || isNaN(recv) || recv < EOM_START) return;
      // وأن يقع إنجازه ضمن الشهر المحسوب
      if(!inRange(secRefDate(sec))) return;
      done++;
      if(sec.endDate&&sec.actualDate){ const d=daysBetween(sec.endDate,sec.actualDate); if(d!==null){ if(d<=0)onTime++; else late++; } }
      const a=ratingAvg(sec.eval); if(a) ratings.push(Number(a));
    }));
    const punctuality=(onTime+late)?Math.round(onTime/(onTime+late)*100):null;
    const avgRating=ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):null;
    // رصيد مراحل الرأي الفني ضمن الفترة (مع احترام تاريخ انطلاق الاحتساب)
    const opinionCount = opinionCreditFor(u, (d)=>{ if(!d) return false; const dd=new Date(d); return !isNaN(dd)&&dd>=from&&dd<=to&&dd>=EOM_START; });
    const doneTotal = done + opinionCount;
    return {name:u.name,username:u.username,doneCount:doneTotal,punctuality,avgRating,opinionCount};
  }).filter(e=>e.doneCount>0);
  if(!list.length) return null;
  const maxDone=Math.max(...list.map(e=>e.doneCount),1);
  const scored=list.map(e=>{
    const qtyN=e.doneCount/maxDone, punctN=(e.punctuality==null?0:e.punctuality)/100, qualN=(e.avgRating?Number(e.avgRating):0)/5;
    // أوزان: كمية الإنجاز 40% (موضوعي) + الالتزام بالوقت 30% + الجودة/التقييم 30%
    const score=qtyN*0.40+punctN*0.30+qualN*0.30;
    return {...e, score:Math.round(score*1000)/10};
  }).sort((a,b)=> b.score-a.score || b.doneCount-a.doneCount);
  return scored[0];
}
/* موظف الشهر المُعلَن رسمياً = الشهر المُنقضي (يظهر في أول الشهر التالي) */
function announcedEmployee(){
  const now=new Date(); const y=now.getFullYear(), m=now.getMonth();
  // الشهر المنقضي: الشهر السابق للحالي
  const from=new Date(y, m-1, 1), to=new Date(y, m, 0);
  const monthName=MONTH_NAMES[(m-1+12)%12];
  const yearOfPrev = (m-1<0)? y-1 : y;
  return { winner:employeeOfMonthFor(from,to), label:`${monthName} ${yearOfPrev}` };
}

function employeeOfMonth(){
  const list=engineerKpiList().filter(e=>e.doneCount>0);   // من أنجز عملاً فعلياً
  if(!list.length) return null;
  // القيم القصوى للتطبيع
  const maxDone=Math.max(...list.map(e=>e.doneCount),1);
  const scored=list.map(e=>{
    const qtyN = e.doneCount/maxDone;                        // كمية الإنجاز (0..1)
    const punctN = (e.punctuality==null?0:e.punctuality)/100; // الالتزام (0..1)
    const qualN = (e.avgRating?Number(e.avgRating):0)/5;      // الجودة (0..1)
    // أوزان: كمية الإنجاز 40% (موضوعي) + الالتزام بالوقت 30% + الجودة/التقييم 30%
    const score = qtyN*0.40 + punctN*0.30 + qualN*0.30;
    return {...e, score:Math.round(score*1000)/10};          // نسبة مئوية بخانة عشرية
  }).sort((a,b)=> b.score-a.score || b.doneCount-a.doneCount);
  return {winner:scored[0], ranking:scored};
}
/* رسم حلقي SVG لنسبة مئوية */
function donutSVG(pct,color,label,sub){
  const r=34,c=2*Math.PI*r,off=c*(1-(pct||0)/100);
  return `<div style="text-align:center">
    <svg width="92" height="92" viewBox="0 0 92 92">
      <circle cx="46" cy="46" r="${r}" fill="none" stroke="var(--line)" stroke-width="9"/>
      <circle cx="46" cy="46" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 46 46)"/>
      <text x="46" y="51" text-anchor="middle" font-size="19" font-weight="800" fill="var(--oasis-700)">${pct==null?'—':pct+'%'}</text>
    </svg>
    <div style="font-size:12.5px;font-weight:700;color:var(--ink);margin-top:2px">${label}</div>
    ${sub?`<div style="font-size:11px;color:var(--muted)">${sub}</div>`:''}</div>`;
}
